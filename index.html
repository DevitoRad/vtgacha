<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>

<title>VTuber Gacha — バーチャルガチャ</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#06060f;overflow-x:hidden;font-family:'Rajdhani',sans-serif;color:#e2e2f0;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:#06060f;}::-webkit-scrollbar-thumb{background:#2a1a4a;border-radius:2px;}

/* ── CARD BASE ─────────────────────────────────────────────────────────────── */
.vtg-card{
  position:relative;border-radius:12px;overflow:hidden;cursor:pointer;
  transition:transform .15s ease,box-shadow .15s ease;
  transform-style:preserve-3d;user-select:none;flex-shrink:0;
  background:#090918;
}
.vtg-card:hover{transform:translateY(-4px) scale(1.03);}

/* Rarity borders */
.vtg-R  {border:1.5px solid #22c55e;box-shadow:0 0 14px #22c55e33,0 6px 24px #00000088;}
.vtg-SR {border:1.5px solid #3b82f6;box-shadow:0 0 18px #3b82f644,0 6px 28px #00000099;}
.vtg-SSR{border:2px solid #a855f7;  box-shadow:0 0 22px #a855f755,0 8px 32px #00000099;}
.vtg-UR {border:2px solid #ffd700;  box-shadow:0 0 28px #ffd70066,0 8px 36px #000000aa;}
.vtg-LR {border:2px solid #ff006e;  box-shadow:0 0 32px #ff006e77,0 8px 40px #000000aa;}

/* Corner accent marks */
.vtg-card::before,.vtg-card::after{
  content:'';position:absolute;width:12px;height:12px;z-index:8;border-style:solid;pointer-events:none;
}
.vtg-card::before{top:7px;left:7px;border-width:1.5px 0 0 1.5px;}
.vtg-card::after {top:7px;right:7px;border-width:1.5px 1.5px 0 0;}
.vtg-R::before,.vtg-R::after    {border-color:#22c55e;}
.vtg-SR::before,.vtg-SR::after  {border-color:#3b82f6;}
.vtg-SSR::before,.vtg-SSR::after{border-color:#a855f7;}
.vtg-UR::before,.vtg-UR::after  {border-color:#ffd700;}
.vtg-LR::before,.vtg-LR::after  {border-color:#ff006e;}
.card-btm-l,.card-btm-r{
  position:absolute;bottom:7px;width:12px;height:12px;z-index:8;border-style:solid;pointer-events:none;
}
.card-btm-l{left:7px;border-width:0 0 1.5px 1.5px;}
.card-btm-r{right:7px;border-width:0 1.5px 1.5px 0;}

/* ── HOLO FOIL ─────────────────────────────────────────────────────────────── */
.holo-foil{
  position:absolute;inset:0;border-radius:inherit;pointer-events:none;z-index:6;
  background:
    radial-gradient(circle at var(--gx,50%) var(--gy,50%),rgba(255,255,255,.38) 0%,transparent 58%),
    conic-gradient(from var(--ha,45deg) at var(--gx,50%) var(--gy,50%),
      rgba(255,0,128,.4),rgba(255,200,0,.4),rgba(0,255,128,.4),
      rgba(0,200,255,.4),rgba(128,0,255,.4),rgba(255,0,128,.4));
  mix-blend-mode:color-dodge;
  opacity:0;transition:opacity .25s;
}
.vtg-SSR:hover .holo-foil{opacity:.55;}
.vtg-UR:hover  .holo-foil{opacity:.7;}
.vtg-LR .holo-foil        {opacity:.5;}
.vtg-LR:hover .holo-foil  {opacity:.85;}

/* Gold shimmer for UR */
.ur-shimmer{
  position:absolute;inset:0;z-index:5;pointer-events:none;border-radius:inherit;
  background:linear-gradient(105deg,transparent 35%,rgba(255,215,0,.18) 50%,transparent 65%);
  background-size:200% 100%;animation:shimmer-gold 2.5s linear infinite;
}
/* Rainbow scan for LR */
.lr-scan{
  position:absolute;inset:0;z-index:5;pointer-events:none;border-radius:inherit;
  background:linear-gradient(105deg,transparent 30%,rgba(255,100,200,.22) 40%,rgba(100,200,255,.22) 55%,rgba(200,255,100,.22) 65%,transparent 75%);
  background-size:300% 100%;animation:shimmer-lr 3s linear infinite;
}

/* ── ANIMATIONS ────────────────────────────────────────────────────────────── */
@keyframes shimmer-gold{0%{background-position:-100% center}100%{background-position:300% center}}
@keyframes shimmer-lr  {0%{background-position:-100% center}100%{background-position:400% center}}
@keyframes rainbow-border{
  0%  {box-shadow:0 0 32px #ff006e77,0 8px 40px #000000aa;border-color:#ff006e;}
  25% {box-shadow:0 0 32px #ffe60077,0 8px 40px #000000aa;border-color:#ffe600;}
  50% {box-shadow:0 0 32px #00ff8877,0 8px 40px #000000aa;border-color:#00ff88;}
  75% {box-shadow:0 0 32px #00cfff77,0 8px 40px #000000aa;border-color:#00cfff;}
  100%{box-shadow:0 0 32px #ff006e77,0 8px 40px #000000aa;border-color:#ff006e;}
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes card-reveal{0%{transform:rotateY(90deg) scale(.88);opacity:0}65%{transform:rotateY(-5deg) scale(1.04)}100%{transform:rotateY(0) scale(1);opacity:1}}
@keyframes pop-in{0%{transform:scale(0) rotate(-8deg);opacity:0}70%{transform:scale(1.12) rotate(1deg)}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes slide-up{from{transform:translateY(28px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes img-in{from{opacity:0}to{opacity:1}}
@keyframes sparkle{0%,100%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1)}}
@keyframes banner-in{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}

.vtg-LR{animation:rainbow-border 2.8s linear infinite!important;}
.float-anim{animation:float 3.5s ease-in-out infinite;}
.card-reveal{animation:card-reveal .6s cubic-bezier(.34,1.3,.64,1) forwards;}
.pop-in{animation:pop-in .4s cubic-bezier(.34,1.56,.64,1) forwards;}
.slide-up{animation:slide-up .38s ease forwards;}

/* ── VIEWER MODAL ──────────────────────────────────────────────────────────── */
.card-modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:100;display:flex;align-items:center;
  justify-content:center;backdrop-filter:blur(8px);
  animation:banner-in .2s ease;
}
.card-modal-bg .vtg-card:hover{transform:none;}

/* ── MISC ──────────────────────────────────────────────────────────────────── */
.shimmer-txt{
  background:linear-gradient(90deg,#c9a227,#fff8,#c9a227);background-size:200%;
  animation:shimmer-gold 2s linear infinite;-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;
}
input[type=text]{
  background:rgba(255,255,255,.06);border:1px solid #2a2a5a;border-radius:8px;
  color:#e2e2f0;font-family:Orbitron;font-size:12px;padding:10px 14px;outline:none;
  transition:border-color .2s;letter-spacing:2px;width:100%;
}
input[type=text]:focus{border-color:#c9a227;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

  {id:'fauna',   name:'Ceres Fauna',        agency:'Hololive EN',rarity:'SSR',atk:7400,def:7500,color:'#22c55e',emoji:'🌿'},

  {id:'mumei',   name:'Nanashi Mumei',      agency:'Hololive EN',rarity:'SSR',atk:7300,def:7400,color:'#d97706',emoji:'🦉'},

  {id:'botan',   name:'Shishiron Botan',    agency:'Hololive JP',rarity:'SSR',atk:7700,def:7500,color:'#64748b',emoji:'🦁'},
  {id:'nyanners', name:'Nyanners',          agency:'VShojo',     rarity:'SSR',atk:7200,def:7500,color:'#d946ef',emoji:'🐱'},
  {id:'haachama',name:'Haachama',           agency:'Hololive JP',rarity:'SSR',atk:7300,def:7200,color:'#ef4444',emoji:'🌶️'},

  {id:'biboo',   name:'Koseki Bijou',       agency:'Hololive EN', rarity:'SR',atk:6400,def:6500,color:'#06b6d4',emoji:'💎'},

  {id:'mirai',   name:'Mirai Akari',        agency:'Independent', rarity:'R', atk:5300,def:5600,color:'#f43f5e',emoji:'⭐'},
  {id:'zentreya',name:'Zentreya',           agency:'VShojo',      rarity:'R', atk:5500,def:5600,color:'#ef4444',emoji:'🐉'},
  {id:'tenma',   name:'Tenma Maemi',        agency:'Phase Connect',rarity:'R',atk:5500,def:5000,color:'#ef4444',emoji:'😤'},
  {id:'nabi',    name:'Nabi',               agency:'Independent', rarity:'R', atk:5100,def:5200,color:'#818cf8',emoji:'🎨'},
  {id:'haruka',  name:'Haruka Karibu',      agency:'VShojo',      rarity:'R', atk:5000,def:5200,color:'#22c55e',emoji:'🦌'},

// ── HELPERS ───────────────────────────────────────────────────────────────────
function useLS(key,def){
  const[v,sv]=useState(()=>{try{const r=localStorage.getItem(key);return r?JSON.parse(r):def;}catch{return def;}});
  useEffect(()=>{try{localStorage.setItem(key,JSON.stringify(v));}catch{}},[key,v]);
  return[v,sv];
}
async function fetchCatIds(cat){
  const ids=[];let cont='';
  do{try{const r=await fetch(`${WIKI}?action=query&list=categorymembers&cmtitle=Category:${encodeURIComponent(cat)}&cmlimit=500&cmtype=page&cmnamespace=0&format=json&origin=*${cont?'&cmcontinue='+encodeURIComponent(cont):''}`);const d=await r.json();(d.query?.categorymembers||[]).forEach(m=>ids.push(m.pageid));cont=d.continue?.cmcontinue||'';}catch{cont='';}}while(cont);
  return ids;
}
async function fetchWikiCards(ids){
  const r=await fetch(`${WIKI}?action=query&pageids=${ids.join('|')}&prop=pageimages|extracts|info&exsentences=2&exintro=1&explaintext=1&piprop=thumbnail&pithumbsize=400&format=json&origin=*`);
  const d=await r.json();return Object.values(d.query?.pages||{}).map(parsePage).filter(Boolean);
}
function parsePage(p){
  if(p.missing!==undefined||!p.title)return null;
  const len=p.length||500,seed=p.pageid;
  const rar=len>=60000?'LR':len>=30000?'UR':len>=14000?'SSR':len>=6000?'SR':'R';
  const rng=s=>{let x=Math.sin(s)*10000;return x-Math.floor(x);};
  const bs={LR:[9200,8800],UR:[8300,8000],SSR:[7200,7000],SR:[6200,6000],R:[5100,5000]};
  const[ab,db]=bs[rar];
  const desc=p.extract||'';
  const knownAgencies=['Hololive','Nijisanji','VShojo','VSPO','Phase Connect','Idol Corp','Prism Project'];
  const agency=knownAgencies.find(a=>desc.includes(a)||p.title.includes(a))||'Independent';
  return{uid:`w_${seed}_${Date.now()}`,id:`w_${seed}`,name:p.title,agency,rarity:rar,
    atk:Math.min(9999,Math.round(ab*(0.88+rng(seed)*.24))),
    def:Math.min(9999,Math.round(db*(0.88+rng(seed+77)*.24))),
    desc:desc.substring(0,110),img:p.thumbnail?.source||null,
    color:RC[rar].color,emoji:EMOJIS[Math.abs(seed)%EMOJIS.length],source:'wiki'};
}
function drawStdCard(){
  const roll=Math.random()*100;let cum=0,rar='R';
  for(const[k,v]of Object.entries(RC)){cum+=v.rate;if(roll<cum){rar=k;break;}}
  const pool=STD.filter(v=>v.rarity===rar);
  const src=pool.length?pool:STD.filter(v=>v.rarity==='R');
  const base=src[Math.floor(Math.random()*src.length)];
  const rng=s=>{let x=Math.sin(s+1)*10000;return x-Math.floor(x);};
  const sd=Math.random()*9999;
  return{...base,uid:`s_${base.id}_${Date.now()}`,
    atk:Math.min(9999,Math.round(base.atk*(0.88+rng(sd)*.24))),
    def:Math.min(9999,Math.round(base.def*(0.88+rng(sd+77)*.24))),source:'standard'};
}
function usePool(){
  const[pool,setPool]=useState([]);
  const[status,setStatus]=useState('loading');
  const[prog,setProg]=useState(0);
  const[total,setTotal]=useState(0);
  const[cached,setCached]=useState(false);
  useEffect(()=>{
    try{const r=localStorage.getItem(POOL_KEY);if(r){const{ids,ts}=JSON.parse(r);if(Date.now()-ts<POOL_TTL&&ids?.length>100){setPool(ids);setStatus('ready');setTotal(ids.length);setCached(true);return;}}}catch{}
    let done=0;
    Promise.all(CATS.map(c=>fetchCatIds(c).then(ids=>{done++;setProg(Math.round(done/CATS.length*100));return ids;}))).then(results=>{
      const all=[...new Set(results.flat())];setPool(all);setStatus('ready');setTotal(all.length);
      try{localStorage.setItem(POOL_KEY,JSON.stringify({ids:all,ts:Date.now()}));}catch{};
    }).catch(()=>setStatus('ready'));
  },[]);
  return{pool,status,prog,total,cached};
}

// ── STARS BG ──────────────────────────────────────────────────────────────────
const Stars=React.memo(()=>{
  const pts=useRef(Array.from({length:60},(_,i)=>({id:i,x:Math.random()*100,y:Math.random()*100,sz:Math.random()*2+.3,d:Math.random()*5}))).current;
  return<div style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:0,overflow:'hidden'}}>
    {pts.map(s=><div key={s.id} style={{position:'absolute',left:`${s.x}%`,top:`${s.y}%`,width:s.sz,height:s.sz,borderRadius:'50%',background:'#fff',animation:`pulse ${2+s.d}s ease-in-out infinite`,animationDelay:`${s.d}s`}}/>)}
    <div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse at 50% -10%,rgba(80,30,180,.18) 0%,transparent 60%)'}}/>
    <div style={{position:'absolute',top:'10%',left:'5%',width:500,height:500,borderRadius:'50%',background:'radial-gradient(circle,rgba(100,30,220,.07) 0%,transparent 70%)',filter:'blur(80px)'}}/>
    <div style={{position:'absolute',bottom:'5%',right:'3%',width:400,height:400,borderRadius:'50%',background:'radial-gradient(circle,rgba(200,162,0,.04) 0%,transparent 70%)',filter:'blur(80px)'}}/>
  </div>;
});

// ── CARD COMPONENT ────────────────────────────────────────────────────────────
const CardBack=({W,H,sm})=>(
  <div style={{width:W,height:H,borderRadius:12,background:'linear-gradient(135deg,#0d0d2b,#1a0a2e,#0a0d1f)',border:'2px solid #2d1b69',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:8,boxShadow:'0 8px 32px rgba(0,0,0,.7)',userSelect:'none',cursor:'pointer',transition:'transform .15s,box-shadow .15s'}}
    onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-5px) scale(1.04)';e.currentTarget.style.boxShadow='0 16px 44px rgba(80,50,255,.35)'}}
    onMouseLeave={e=>{e.currentTarget.style.transform='';e.currentTarget.style.boxShadow='0 8px 32px rgba(0,0,0,.7)'}}>
    <div style={{fontSize:sm?22:38,opacity:.22}}>🎴</div>
    <div style={{color:'#3a3a7a',fontFamily:'Orbitron',fontSize:sm?5:7,letterSpacing:2}}>CLICK TO REVEAL</div>
  </div>
);

const CardImg=({card,artH})=>{
  const[loaded,setLoaded]=useState(false);
  const[err,setErr]=useState(false);
  if(!card.img||err)return(
    <div style={{width:'100%',height:artH,display:'flex',alignItems:'center',justifyContent:'center',
      background:`radial-gradient(ellipse at center,${card.color}28 0%,transparent 70%)`,fontSize:artH*.48,
      filter:`drop-shadow(0 0 18px ${card.color}) drop-shadow(0 0 36px ${card.color}66)`}}>
      {card.emoji}
    </div>
  );
  return<div style={{width:'100%',height:artH,position:'relative',overflow:'hidden'}}>
    {!loaded&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',background:'#05050f'}}>
      <div style={{width:20,height:20,border:`2px solid ${card.color}44`,borderTopColor:card.color,borderRadius:'50%',animation:'spin .8s linear infinite'}}/>
    </div>}
    <img src={card.img} alt={card.name} referrerPolicy="no-referrer" onLoad={()=>setLoaded(true)} onError={()=>setErr(true)}
      className={loaded?'img-in':''} style={{width:'100%',height:'100%',objectFit:'cover',objectPosition:'top center',display:'block',opacity:loaded?1:0}}/>
    {/* Art bottom fade */}
    <div style={{position:'absolute',bottom:0,left:0,right:0,height:48,
      background:`linear-gradient(transparent,#090918)`,pointerEvents:'none'}}/>
  </div>;
};

const Card=({card,size='md',revealed=true,onClick,viewer=false,floating=false})=>{
  const r=RC[card.rarity];
  const sm=size==='sm',lg=viewer;
  const W=lg?276:sm?134:196,H=lg?406:sm?194:286,artH=lg?188:sm?78:130;
  const cardRef=useRef(null);
  const isLR=card.rarity==='LR',isUR=card.rarity==='UR',isSSR=card.rarity==='SSR';
  const isHolo=isLR||isUR||isSSR;

  const onMM=useCallback(e=>{
    if(!isHolo&&!viewer)return;
    const el=cardRef.current;if(!el)return;
    const rect=el.getBoundingClientRect();
    const x=(e.clientX-rect.left)/rect.width,y=(e.clientY-rect.top)/rect.height;
    el.style.setProperty('--gx',`${x*100}%`);
    el.style.setProperty('--gy',`${y*100}%`);
    el.style.setProperty('--ha',`${Math.atan2(y-.5,x-.5)*(180/Math.PI)+90}deg`);
    if(viewer||floating){
      const rX=(y-.5)*-22,rY=(x-.5)*22;
      el.style.transform=`perspective(900px) rotateX(${rX}deg) rotateY(${rY}deg) scale(1.04)`;
    }
  },[isHolo,viewer,floating]);

  const onML=useCallback(()=>{
    const el=cardRef.current;if(!el)return;
    el.style.removeProperty('--gx');el.style.removeProperty('--gy');el.style.removeProperty('--ha');
    if(viewer||floating)el.style.transform='';
  },[viewer,floating]);

  if(!revealed)return<CardBack W={W} H={H} sm={sm}/>;

  return(
    <div ref={cardRef} className={`vtg-card vtg-${card.rarity} ${floating?'float-anim':''}`}
      onClick={onClick} onMouseMove={onMM} onMouseLeave={onML}
      style={{width:W,height:H,background:r.bg,display:'flex',flexDirection:'column',overflow:'visible'}}>
      {/* Bottom corners (top handled by CSS ::before/::after) */}
      <div className="card-btm-l" style={{borderColor:r.color}}/>
      <div className="card-btm-r" style={{borderColor:r.color}}/>

      {/* Rarity strip + stars */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:sm?'6px 9px 3px':'8px 11px 4px',flexShrink:0,position:'relative',zIndex:7}}>
        <div style={{background:r.color,color:'#000',fontFamily:'Orbitron',fontSize:sm?6:7.5,fontWeight:900,padding:sm?'1px 5px':'2px 7px',borderRadius:4,letterSpacing:1,textShadow:'none'}}>{card.rarity}</div>
        <div style={{display:'flex',gap:1.5}}>{Array.from({length:Math.min(r.stars,5)}).map((_,i)=><span key={i} style={{color:r.color,fontSize:sm?6.5:8.5,textShadow:`0 0 6px ${r.color}`}}>★</span>)}</div>
      </div>

      {/* Art */}
      <div style={{flexShrink:0,overflow:'hidden',borderTop:`1px solid ${r.color}44`,borderBottom:`1px solid ${r.color}44`}}>
        <CardImg card={card} artH={artH}/>
      </div>

      {/* Info */}
      <div style={{flex:1,padding:sm?'5px 9px 6px':'7px 11px 8px',display:'flex',flexDirection:'column',gap:sm?2:3,position:'relative',zIndex:7}}>
        <div style={{fontFamily:'Cinzel',fontWeight:700,color:'#f0f0ff',fontSize:sm?8:11,lineHeight:1.2,textShadow:`0 0 10px ${r.color}88`,letterSpacing:.5,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
          {card.name}
        </div>
        <div style={{fontFamily:'Rajdhani',color:r.color,fontSize:sm?7:9,fontWeight:700,letterSpacing:1,opacity:.9,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{card.agency}</div>
        {!sm&&card.desc&&<div style={{fontFamily:'Rajdhani',color:'#6678aa',fontSize:8.5,lineHeight:1.45,overflow:'hidden',maxHeight:28,opacity:.85}}>{card.desc.substring(0,80)}{card.desc.length>80?'…':''}</div>}
        {/* Stats */}
        <div style={{marginTop:sm?1:2}}>
          {[['ATK','#ff6b6b',card.atk],['DEF','#6bcfff',card.def]].map(([l,c,v])=>(
            <div key={l} style={{display:'flex',gap:4,alignItems:'center',marginBottom:sm?1.5:2.5}}>
              <div style={{color:c,fontFamily:'Orbitron',fontSize:sm?5.5:7,fontWeight:700,width:sm?20:26}}>{l}</div>
              <div style={{flex:1,background:'rgba(0,0,0,.5)',borderRadius:3,height:sm?3:4,overflow:'hidden'}}>
                <div style={{height:'100%',width:`${v/9999*100}%`,background:`linear-gradient(90deg,${c}88,${c})`,borderRadius:3}}/>
              </div>
              <div style={{color:c,fontFamily:'Rajdhani',fontSize:sm?8:10,fontWeight:700,width:sm?26:33,textAlign:'right'}}>{v.toLocaleString()}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Holo effects */}
      {isHolo&&<div className="holo-foil"/>}
      {isUR&&<div className="ur-shimmer"/>}
      {isLR&&<div className="lr-scan"/>}
    </div>
  );
};

// ── PACK ──────────────────────────────────────────────────────────────────────
const PackScreen=({pool,onBack,onAdd})=>{
  const[phase,setPhase]=useState('ready');
  const[cards,setCards]=useState([]);
  const[revealed,setRevealed]=useState([]);
  const[key,setKey]=useState(0);
  const[loading,setLoading]=useState(false);
  const[banner,setBanner]=useState('wiki');
  const prefRef=useRef(null);

  const pickIds=useCallback((n=5)=>{if(!pool.length)return[];const s=new Set();while(s.size<Math.min(n,pool.length))s.add(pool[Math.floor(Math.random()*pool.length)]);return[...s];},[pool]);
  const prefetch=useCallback(()=>{if(pool.length)prefRef.current=fetchWikiCards(pickIds(5));},[pool,pickIds]);
  useEffect(()=>{prefetch();},[prefetch]);

  const open=async(type)=>{
    setLoading(true);setCards([]);setRevealed([]);setPhase('opening');setKey(k=>k+1);
    try{
      let result;
      if(type==='standard'){result=Array.from({length:5},drawStdCard);}
      else{result=prefRef.current?await prefRef.current:await fetchWikiCards(pickIds(5));prefRef.current=null;}
      setCards(result.filter(Boolean));setLoading(false);setTimeout(prefetch,300);
    }catch{setLoading(false);setPhase('ready');}
  };
  const revealOne=i=>{const n=[...revealed,i];setRevealed(n);if(n.length===cards.length)setTimeout(()=>setPhase('done'),400);};
  const revealAll=()=>{setRevealed(cards.map((_,i)=>i));setTimeout(()=>setPhase('done'),400);};
  const addAll=()=>{onAdd(cards);onBack();};

  return<div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',padding:'26px 16px',position:'relative',zIndex:2}}>
    <div style={{width:'100%',maxWidth:900,display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
      <BackBtn onClick={onBack}/>
      <div style={{fontFamily:'Cinzel',fontWeight:700,fontSize:14,color:'#c9a227',letterSpacing:3}}>PACK OPENING</div>
      <div style={{width:60}}/>
    </div>

    {phase==='ready'&&<div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:24}}>
      <div className="float-anim" style={{fontSize:90,filter:'drop-shadow(0 0 32px #a855f7)'}}>🎴</div>
      {/* Banner selection */}
      <div style={{display:'flex',gap:10,flexWrap:'wrap',justifyContent:'center'}}>
        {[{k:'wiki',icon:'🌐',label:'EXPLORER PACK',sub:'Thousands of wiki VTubers',c:'#a855f7'},{k:'standard',icon:'⭐',label:'STANDARD PACK',sub:'35 dex VTubers (set completion)',c:'#c9a227'}].map(b=>(
          <button key={b.k} onClick={()=>setBanner(b.k)} style={{background:banner===b.k?`${b.c}22`:'rgba(255,255,255,.02)',border:`1.5px solid ${banner===b.k?b.c:b.c+'33'}`,borderRadius:12,padding:'12px 20px',cursor:'pointer',textAlign:'left',transition:'all .2s',minWidth:190}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontSize:20}}>{b.icon}</span>
              <div>
                <div style={{fontFamily:'Orbitron',fontSize:10,color:banner===b.k?b.c:'#667',fontWeight:700,letterSpacing:1}}>{b.label}</div>
                <div style={{fontFamily:'Rajdhani',fontSize:11,color:'#445',marginTop:1}}>{b.sub}</div>
              </div>
            </div>
          </button>
        ))}
      </div>
      <button onClick={()=>open(banner)} style={{background:'linear-gradient(135deg,#4a1a7e,#7c3aed)',border:'none',borderRadius:14,padding:'14px 56px',cursor:'pointer',fontFamily:'Orbitron',fontWeight:700,fontSize:13,color:'#fff',letterSpacing:2,boxShadow:'0 8px 36px #7c3aed66',transition:'all .2s'}} onMouseEnter={e=>{e.currentTarget.style.transform='scale(1.06)';e.currentTarget.style.boxShadow='0 14px 48px #7c3aed88'}} onMouseLeave={e=>{e.currentTarget.style.transform='';e.currentTarget.style.boxShadow='0 8px 36px #7c3aed66'}}>
        OPEN PACK
      </button>
    </div>}

    {(phase==='opening'||phase==='done')&&<div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:18,width:'100%'}}>
      {loading&&<div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:14,padding:50}}><Spinner color="#a855f7"/><div style={{fontFamily:'Orbitron',fontSize:10,color:'#445',letterSpacing:3}}>DRAWING CARDS...</div></div>}
      {!loading&&cards.length>0&&<>
        <div style={{display:'flex',gap:10,flexWrap:'wrap',justifyContent:'center',alignItems:'flex-end'}}>
          {cards.map((card,i)=>{const isRev=revealed.includes(i);const r=RC[card.rarity];
            return<div key={`${key}_${i}`} style={{position:'relative'}}>
              {isRev?<div className="card-reveal"><Card card={card}/></div>:<div onClick={()=>revealOne(i)}><CardBack W={196} H={286} sm={false}/></div>}
              {isRev&&(card.rarity==='LR'||card.rarity==='UR')&&<div className="pop-in" style={{position:'absolute',top:-18,left:'50%',transform:'translateX(-50%)',background:r.color,color:'#000',fontFamily:'Orbitron',fontSize:8,fontWeight:900,padding:'3px 10px',borderRadius:20,whiteSpace:'nowrap',boxShadow:`0 0 16px ${r.color}`,zIndex:20}}>{r.label}!!</div>}
            </div>;})}
        </div>
        <div style={{display:'flex',gap:10,flexWrap:'wrap',justifyContent:'center',marginTop:4}}>
          {phase==='opening'&&revealed.length<cards.length&&<Btn onClick={revealAll} color="#a855f7" label="Reveal All"/>}
          {phase==='done'&&<><Btn onClick={addAll} color="#22c55e" label="✓ Add to Collection"/><Btn onClick={()=>open(banner)} color="#a855f7" label="Open Another"/></>}
        </div>
        {phase==='done'&&<div className="slide-up" style={{display:'flex',gap:6,flexWrap:'wrap',justifyContent:'center'}}>
          {cards.map((c,i)=>{const r=RC[c.rarity];return<div key={i} style={{background:`${r.color}18`,border:`1px solid ${r.color}44`,borderRadius:8,padding:'3px 10px',fontFamily:'Rajdhani',fontSize:12,color:r.txt,fontWeight:600}}>{c.rarity} · {c.name.split(' ').slice(0,2).join(' ')}</div>;})}
        </div>}
      </>}
    </div>}
  </div>;
};

// ── COLLECTION ────────────────────────────────────────────────────────────────

        <div style={{display:'flex',gap:6,marginBottom:16,flexWrap:'wrap',justifyContent:'center'}}>
          {['ALL',...RORD].map(r=>{const rc=r==='ALL'?null:RC[r];const cnt=r==='ALL'?collection.length:(cnts[r]||0);const on=filter===r;return(
            <button key={r} onClick={()=>setFilter(r)} style={{background:on?(rc?rc.color:'#c9a227'):'rgba(255,255,255,.03)',border:`1px solid ${rc?rc.color+'55':'#2a2a4a'}`,borderRadius:20,padding:'3px 12px',cursor:'pointer',fontFamily:'Orbitron',fontSize:8,fontWeight:700,color:on?'#000':(rc?rc.color:'#445'),transition:'all .2s'}}>

          ?<div style={{textAlign:'center',color:'#2a2a4a',fontFamily:'Rajdhani',fontSize:16,marginTop:50}}>No cards yet — open some packs!</div>
          :<div style={{display:'flex',flexWrap:'wrap',gap:10,justifyContent:'center'}}>
            {sorted.map(c=><div key={c.uid} onClick={()=>setViewer(c)} style={{cursor:'pointer'}}><Card card={c} size="sm"/></div>)}
          </div>}
      </>}

      {/* DEX TAB */}
      {tab==='dex'&&<>
        {/* Progress bar */}
        <div style={{background:'rgba(255,255,255,.02)',border:'1px solid #1e1e3a',borderRadius:12,padding:'14px 18px',marginBottom:18}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
            <div style={{fontFamily:'Orbitron',fontSize:11,color:'#c9a227'}}>SET COMPLETION</div>
            <div style={{fontFamily:'Orbitron',fontSize:11,color:'#c9a227'}}>{dexOwned.length}/{STD.length}</div>
          </div>
          <div style={{background:'#0a0a1e',borderRadius:20,height:8,overflow:'hidden'}}>
            <div style={{height:'100%',width:`${dexPct}%`,background:'linear-gradient(90deg,#c9a22766,#c9a227)',borderRadius:20,transition:'width .5s'}}/>
          </div>
        </div>

        <div style={{display:'flex',gap:8,marginBottom:14,justifyContent:'center',flexWrap:'wrap'}}>
          {[['ALL',STD.length],['OWNED',dexOwned.length],['MISSING',dexMissing.length]].map(([l,n])=>(
            <button key={l} onClick={()=>setFilter(l)} style={{background:filter===l?'rgba(201,162,39,.15)':'rgba(255,255,255,.02)',border:`1px solid ${filter===l?'#c9a22755':'#1e1e3a'}`,borderRadius:20,padding:'3px 14px',cursor:'pointer',fontFamily:'Orbitron',fontSize:8,color:filter===l?'#c9a227':'#445',letterSpacing:1}}>
              {l} ({n})
            </button>
          ))}
        </div>

        <div style={{display:'flex',flexWrap:'wrap',gap:10,justifyContent:'center'}}>
          {(filter==='MISSING'?dexMissing:filter==='OWNED'?dexOwned:STD).map(s=>{
            const owned=ownedNames.has(s.name.toLowerCase());
            const ownedCard=collection.find(c=>c.name.toLowerCase()===s.name.toLowerCase());
            return<div key={s.id} style={{position:'relative',opacity:owned?1:.42,filter:owned?'none':'grayscale(60%)'}} onClick={()=>ownedCard&&setViewer(ownedCard)}>
              <Card card={{...s,uid:`dex_${s.id}`,desc:'',img:null,source:'standard'}} size="sm"/>
              {owned&&<div style={{position:'absolute',top:4,right:4,background:'#22c55e',width:16,height:16,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',zIndex:20,fontSize:9}}>✓</div>}
              {!owned&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',borderRadius:12,zIndex:10}}>
                <div style={{fontFamily:'Orbitron',fontSize:7,color:'#445',letterSpacing:1,background:'rgba(0,0,0,.6)',padding:'2px 6px',borderRadius:4}}>NOT FOUND</div>
              </div>}
            </div>;
          })}
        </div>
      </>}
    </div>
  </div>;
};

// ── SOLO BATTLE ───────────────────────────────────────────────────────────────
const BattleScreen=({collection,pool,onBack})=>{
  const[phase,setPhase]=useState('select');
  const[mine,setMine]=useState(null);
  const[opp,setOpp]=useState(null);
  const[result,setResult]=useState(null);
  const[log,setLog]=useState([]);
  const[hit,setHit]=useState('');
  const[oppLoad,setOppLoad]=useState(false);
  const[viewer,setViewer]=useState(null);
  const RR={win:{l:'VICTORY!',c:'#22c55e',e:'🏆'},lose:{l:'DEFEATED',c:'#ef4444',e:'💀'},draw:{l:'DRAW',c:'#f59e0b',e:'🤝'}};

  const fight=async card=>{
    setMine(card);setPhase('fighting');setOppLoad(true);
    try{
      const id=pool[Math.floor(Math.random()*pool.length)];
      const[o]=await fetchWikiCards([id]);
      setOpp(o||card);setOppLoad(false);
      setTimeout(()=>{
        const rng=()=>.75+Math.random()*.5;
        const mA=card.atk*rng(),mD=card.def*rng(),oA=(o?.atk||5e3)*rng(),oD=(o?.def||5e3)*rng();
        const mT=mA+mD,oT=oA+oD;
        const out=mT>oT*1.05?'win':mT<oT*.95?'lose':'draw';
        setHit(out==='win'?'opp':out==='lose'?'mine':'');setResult(out);
        setLog([`⚔️ ${card.name} ATK ${Math.round(mA).toLocaleString()}`,`🛡 ${card.name} DEF ${Math.round(mD).toLocaleString()}`,`⚔️ ${o?.name||'???'} ATK ${Math.round(oA).toLocaleString()}`,`🛡 ${o?.name||'???'} DEF ${Math.round(oD).toLocaleString()}`,`📊 Your total: ${Math.round(mT).toLocaleString()} | Opp: ${Math.round(oT).toLocaleString()}`]);
        setPhase('result');
      },1800);
    }catch{setOppLoad(false);setPhase('select');}
  };
  const reset=()=>{setPhase('select');setMine(null);setOpp(null);setResult(null);setLog([]);setHit('');};

  return<div style={{minHeight:'100vh',padding:'24px 16px',position:'relative',zIndex:2}}>
    {viewer&&<CardViewer card={viewer} onClose={()=>setViewer(null)}/>}
    <div style={{maxWidth:900,margin:'0 auto',display:'flex',flexDirection:'column',alignItems:'center',gap:18}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',width:'100%'}}>
        <BackBtn onClick={onBack}/>
        <div style={{fontFamily:'Cinzel',fontWeight:700,fontSize:13,color:'#c9a227',letterSpacing:3}}>SOLO BATTLE</div>
        <div style={{width:60}}/>
      </div>
      {phase==='select'&&<>
        <div style={{fontFamily:'Rajdhani',color:'#556',fontSize:13}}>Select your fighter — click to view, click again to battle</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:10,justifyContent:'center'}}>
          {[...collection].sort((a,b)=>(b.atk+b.def)-(a.atk+a.def)).map(c=>(
            <div key={c.uid} style={{position:'relative'}}>
              <div onClick={()=>fight(c)}><Card card={c} size="sm"/></div>
              <div style={{position:'absolute',bottom:40,left:'50%',transform:'translateX(-50%)',background:'rgba(0,0,0,.9)',borderRadius:6,padding:'1px 7px',fontFamily:'Orbitron',fontSize:9,color:'#c9a227',whiteSpace:'nowrap'}}>
                {(c.atk+c.def).toLocaleString()}
              </div>
              <div onClick={()=>setViewer(c)} style={{position:'absolute',top:4,left:'50%',transform:'translateX(-50%)',background:'rgba(0,0,0,.7)',borderRadius:4,padding:'1px 7px',fontFamily:'Orbitron',fontSize:7,color:'#556',cursor:'pointer',whiteSpace:'nowrap'}}>👁</div>
            </div>
          ))}
        </div>
      </>}
      {(phase==='fighting'||phase==='result')&&mine&&<>
        <div style={{display:'flex',alignItems:'center',gap:22,flexWrap:'wrap',justifyContent:'center',width:'100%'}}>
          <div className={phase==='result'&&hit==='mine'?'battle-shake':''} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8}}>
            <div style={{fontFamily:'Orbitron',fontSize:9,color:'#22c55e',letterSpacing:2}}>YOU</div>
            <div onClick={()=>setViewer(mine)}><Card card={mine} floating={phase==='fighting'}/></div>
          </div>
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8,minWidth:90}}>
            {phase==='fighting'&&<div style={{fontFamily:'Orbitron',fontSize:32,fontWeight:900,color:'#ef4444',textShadow:'0 0 22px #ef4444'}}>VS</div>}
            {phase==='result'&&result&&<div className="pop-in" style={{textAlign:'center'}}>
              <div style={{fontSize:40}}>{RR[result].e}</div>
              <div style={{fontFamily:'Cinzel',fontWeight:700,fontSize:18,color:RR[result].c,textShadow:`0 0 20px ${RR[result].c}`}}>{RR[result].l}</div>
            </div>}
          </div>
          <div className={phase==='result'&&hit==='opp'?'battle-shake':''} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8}}>
            <div style={{fontFamily:'Orbitron',fontSize:9,color:'#ef4444',letterSpacing:2}}>OPP</div>
            {oppLoad?<div style={{width:196,height:286,borderRadius:12,background:'#090918',border:'1.5px solid #2d1b69',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:12}}><Spinner/><div style={{fontFamily:'Orbitron',fontSize:9,color:'#334',letterSpacing:2}}>SEARCHING...</div></div>
              :opp&&<div onClick={()=>opp&&setViewer(opp)}><Card card={opp} revealed={phase==='result'} floating={phase==='fighting'}/></div>}
          </div>
        </div>
        {phase==='result'&&<div className="slide-up" style={{background:'rgba(255,255,255,.02)',border:'1px solid #1a1a3a',borderRadius:12,padding:'12px 18px',width:'100%',maxWidth:480}}>
          {log.map((l,i)=><div key={i} style={{fontFamily:'Rajdhani',fontSize:12,color:'#334466',lineHeight:2}}>{l}</div>)}
        </div>}
        {phase==='result'&&<div style={{display:'flex',gap:10,flexWrap:'wrap',justifyContent:'center'}}><Btn onClick={reset} color="#a855f7" label="Battle Again"/><Btn onClick={onBack} color="#333344" label="Menu" sm/></div>}
        {phase==='fighting'&&!oppLoad&&<div style={{fontFamily:'Orbitron',fontSize:10,color:'#2a2a4a',letterSpacing:4,animation:'pulse 1s ease-in-out infinite'}}>CALCULATING...</div>}
      </>}
    </div>
  </div>;
};

// ── MULTIPLAYER ───────────────────────────────────────────────────────────────
const MultiScreen=({collection,onBack})=>{
  const[mode,setMode]=useState('menu');
  const[peer,setPeer]=useState(null);
  const[conn,setConn]=useState(null);
  const[code,setCode]=useState('');
  const[joinVal,setJoinVal]=useState('');
  const[isHost,setIsHost]=useState(false);
  const[oppName,setOppName]=useState('Challenger');
  const[status,setStatus]=useState('');
  const[mine,setMine]=useState(null);
  const[opp,setOpp]=useState(null);
  const[result,setResult]=useState(null);
  const[log,setLog]=useState([]);
  const[viewer,setViewer]=useState(null);
  const connRef=useRef(null);

  const cleanup=()=>{try{peer?.destroy();}catch{}setPeer(null);setConn(null);connRef.current=null;};

  const setupConn=(c,hosting)=>{
    connRef.current=c;setConn(c);
    c.on('data',data=>{
      if(data.t==='hello'){setOppName(data.name||'Player 2');setMode('lobby');setStatus('Opponent connected! Both pick a card.');}
      if(data.t==='card'){setOpp(data.card);setStatus('');}
      if(data.t==='rematch'){setMine(null);setOpp(null);setResult(null);setMode('lobby');setStatus('Rematch!');}
    });
    c.on('close',()=>{setStatus('Connection lost.');setMode('menu');cleanup();});
    if(!hosting)c.send({t:'hello',name:'Player 2'});
  };

  const hostGame=()=>{
    if(!window.Peer){setStatus('PeerJS not loaded. Try refreshing.');return;}
    setStatus('Initializing...');
    const p=new window.Peer();
    p.on('open',id=>{setCode(id.substring(0,8).toUpperCase());setIsHost(true);setMode('host');setStatus('Waiting for opponent...');});
    p.on('connection',c=>{setupConn(c,true);});
    p.on('error',e=>{setStatus('Connection error: '+e.type);});
    setPeer(p);
  };

  const joinGame=()=>{
    if(!joinVal.trim()){return;}
    if(!window.Peer){setStatus('PeerJS not loaded.');return;}
    setStatus('Connecting...');
    const p=new window.Peer();
    p.on('open',()=>{
      const c=p.connect(joinVal.trim());
      c.on('open',()=>{setupConn(c,false);setIsHost(false);setMode('lobby');});
      c.on('error',()=>setStatus('Could not connect. Check the code.'));
    });
    p.on('error',e=>setStatus('Error: '+e.type));
    setPeer(p);
  };

  const pickCard=card=>{
    setMine(card);setMode('battle');
    connRef.current?.send({t:'card',card});
    setStatus('Waiting for opponent\'s card...');
  };

  useEffect(()=>{
    if(!mine||!opp)return;
    const rng=()=>.75+Math.random()*.5;
    const mA=mine.atk*rng(),mD=mine.def*rng(),oA=opp.atk*rng(),oD=opp.def*rng();
    const mT=mA+mD,oT=oA+oD;
    const out=mT>oT*1.05?'win':mT<oT*.95?'lose':'draw';
    setResult(out);
    setLog([`⚔️ ${mine.name} ATK ${Math.round(mA).toLocaleString()}`,`🛡 ${mine.name} DEF ${Math.round(mD).toLocaleString()}`,`⚔️ ${opp.name} ATK ${Math.round(oA).toLocaleString()}`,`🛡 ${opp.name} DEF ${Math.round(oD).toLocaleString()}`,`📊 You: ${Math.round(mT).toLocaleString()} | Opponent: ${Math.round(oT).toLocaleString()}`]);
    setStatus('');
  },[mine,opp]);

  const rematch=()=>{setMine(null);setOpp(null);setResult(null);setMode('lobby');connRef.current?.send({t:'rematch'});setStatus('Rematch started!');};
  const backToMenu=()=>{cleanup();setMode('menu');setCode('');setJoinVal('');setOppName('Challenger');setMine(null);setOpp(null);setResult(null);setLog([]);setStatus('');};
  const RR={win:{l:'VICTORY!',c:'#22c55e',e:'🏆'},lose:{l:'DEFEATED',c:'#ef4444',e:'💀'},draw:{l:'DRAW',c:'#f59e0b',e:'🤝'}};

  return<div style={{minHeight:'100vh',padding:'24px 16px',position:'relative',zIndex:2}}>
    {viewer&&<CardViewer card={viewer} onClose={()=>setViewer(null)}/>}
    <div style={{maxWidth:900,margin:'0 auto',display:'flex',flexDirection:'column',alignItems:'center',gap:20}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',width:'100%'}}>
        <BackBtn onClick={mode==='menu'?onBack:backToMenu}/>
        <div style={{fontFamily:'Cinzel',fontWeight:700,fontSize:13,color:'#22c55e',letterSpacing:3}}>MULTIPLAYER</div>
        <div style={{width:60}}/>
      </div>

      {status&&<div style={{fontFamily:'Rajdhani',color:'#c9a227',fontSize:13,letterSpacing:1,textAlign:'center',padding:'8px 18px',background:'rgba(201,162,39,.08)',border:'1px solid #c9a22733',borderRadius:8}}>{status}</div>}

      {mode==='menu'&&<>
        <div style={{fontFamily:'Rajdhani',color:'#445',fontSize:14,textAlign:'center',maxWidth:320}}>Challenge a friend to a card battle via P2P — no account needed.</div>
        <div style={{display:'flex',gap:14,flexWrap:'wrap',justifyContent:'center'}}>
          <button onClick={hostGame} style={{background:'linear-gradient(135deg,rgba(34,197,94,.15),rgba(34,197,94,.06))',border:'1.5px solid #22c55e55',borderRadius:14,padding:'20px 28px',cursor:'pointer',textAlign:'center',minWidth:160,transition:'all .2s'}} onMouseEnter={e=>e.currentTarget.style.transform='translateY(-3px)'} onMouseLeave={e=>e.currentTarget.style.transform=''}>
            <div style={{fontSize:32}}>🏠</div>
            <div style={{fontFamily:'Orbitron',fontSize:11,color:'#22c55e',fontWeight:700,marginTop:8,letterSpacing:1}}>HOST GAME</div>
            <div style={{fontFamily:'Rajdhani',fontSize:11,color:'#334',marginTop:4}}>Get a room code</div>
          </button>
          <button onClick={()=>setMode('join')} style={{background:'linear-gradient(135deg,rgba(59,130,246,.15),rgba(59,130,246,.06))',border:'1.5px solid #3b82f655',borderRadius:14,padding:'20px 28px',cursor:'pointer',textAlign:'center',minWidth:160,transition:'all .2s'}} onMouseEnter={e=>e.currentTarget.style.transform='translateY(-3px)'} onMouseLeave={e=>e.currentTarget.style.transform=''}>
            <div style={{fontSize:32}}>🔗</div>
            <div style={{fontFamily:'Orbitron',fontSize:11,color:'#3b82f6',fontWeight:700,marginTop:8,letterSpacing:1}}>JOIN GAME</div>
            <div style={{fontFamily:'Rajdhani',fontSize:11,color:'#334',marginTop:4}}>Enter room code</div>
          </button>
        </div>
      </>}

      {mode==='host'&&<div style={{textAlign:'center',display:'flex',flexDirection:'column',alignItems:'center',gap:16}}>
        <div style={{fontFamily:'Rajdhani',color:'#556',fontSize:13}}>Share this code with your opponent:</div>
        <div style={{fontFamily:'Orbitron',fontSize:28,fontWeight:900,color:'#22c55e',letterSpacing:6,padding:'16px 32px',background:'rgba(34,197,94,.08)',border:'2px solid #22c55e44',borderRadius:12}}>
          {code||'Loading...'}
        </div>
        <div style={{fontFamily:'Rajdhani',color:'#334',fontSize:12}}>Waiting for opponent to connect...</div>
        <Spinner color="#22c55e"/>
      </div>}

      {mode==='join'&&<div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:14,width:'100%',maxWidth:300}}>
        <div style={{fontFamily:'Rajdhani',color:'#556',fontSize:13}}>Enter your opponent's room code:</div>
        <input type="text" value={joinVal} onChange={e=>setJoinVal(e.target.value.toUpperCase())} placeholder="ROOM CODE" onKeyDown={e=>e.key==='Enter'&&joinGame()}/>
        <Btn onClick={joinGame} color="#3b82f6" label="JOIN GAME" disabled={!joinVal.trim()}/>
      </div>}

      {mode==='lobby'&&<>
        <div style={{fontFamily:'Rajdhani',color:'#22c55e',fontSize:14,textAlign:'center'}}>✓ Connected to {oppName}! Pick your card to battle.</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:10,justifyContent:'center'}}>
          {[...collection].sort((a,b)=>(b.atk+b.def)-(a.atk+a.def)).map(c=>(
            <div key={c.uid} style={{position:'relative'}}>
              <div onClick={()=>pickCard(c)}><Card card={c} size="sm"/></div>
              <div onClick={()=>setViewer(c)} style={{position:'absolute',top:4,left:'50%',transform:'translateX(-50%)',background:'rgba(0,0,0,.7)',borderRadius:4,padding:'1px 7px',fontFamily:'Orbitron',fontSize:7,color:'#556',cursor:'pointer'}}>👁</div>
            </div>
          ))}
        </div>
      </>}

      {mode==='battle'&&mine&&<>
        <div style={{display:'flex',alignItems:'center',gap:22,flexWrap:'wrap',justifyContent:'center'}}>
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8}}>
            <div style={{fontFamily:'Orbitron',fontSize:9,color:'#22c55e',letterSpacing:2}}>YOU</div>
            <div onClick={()=>setViewer(mine)}><Card card={mine}/></div>
          </div>
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8,minWidth:90}}>
            {!result&&!opp&&<><div style={{fontFamily:'Orbitron',fontSize:28,fontWeight:900,color:'#ef4444'}}>VS</div><Spinner/></>}
            {result&&<div className="pop-in" style={{textAlign:'center'}}><div style={{fontSize:40}}>{RR[result].e}</div><div style={{fontFamily:'Cinzel',fontWeight:700,fontSize:16,color:RR[result].c}}>{RR[result].l}</div></div>}
          </div>
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8}}>
            <div style={{fontFamily:'Orbitron',fontSize:9,color:'#ef4444',letterSpacing:2}}>{oppName.toUpperCase()}</div>
            {opp?<div onClick={()=>setViewer(opp)}><Card card={opp} revealed={!!result}/></div>:<div style={{width:196,height:286,borderRadius:12,background:'#090918',border:'1.5px solid #2d1b69',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:12}}><Spinner/><div style={{fontFamily:'Orbitron',fontSize:8,color:'#334',letterSpacing:2}}>WAITING...</div></div>}
          </div>
        </div>
        {result&&log.length>0&&<div className="slide-up" style={{background:'rgba(255,255,255,.02)',border:'1px solid #1a1a3a',borderRadius:12,padding:'12px 18px',width:'100%',maxWidth:480}}>
          {log.map((l,i)=><div key={i} style={{fontFamily:'Rajdhani',fontSize:12,color:'#334466',lineHeight:2}}>{l}</div>)}
        </div>}
        {result&&<div style={{display:'flex',gap:10,flexWrap:'wrap',justifyContent:'center'}}><Btn onClick={rematch} color="#22c55e" label="Rematch"/><Btn onClick={backToMenu} color="#333344" label="Quit" sm/></div>}
      </>}
    </div>
  </div>;
};

// ── APP ROOT ──────────────────────────────────────────────────────────────────
function App(){
  const[screen,setScreen]=useState('menu');
  const[collection,setCollection]=useLS(COLL_KEY,[]);
  const[pulls,setPulls]=useLS(PULLS_KEY,0);
  const{pool,status,prog,total,cached}=usePool();

  const addCards=cards=>{
    setCollection(p=>[...p,...cards]);
    setPulls(p=>p+cards.length);
  };

  return<div style={{minHeight:'100vh',background:'#06060f',position:'relative'}}>
    <Stars/>
    {screen==='menu'      &&<MenuScreen collection={collection} pulls={pulls} status={status} prog={prog} total={total} cached={cached} onPack={()=>setScreen('pack')} onCollection={()=>setScreen('collection')} onBattle={()=>setScreen('battle')} onMulti={()=>setScreen('multi')}/>}
    {screen==='pack'      &&<PackScreen pool={pool} onBack={()=>setScreen('menu')} onAdd={addCards}/>}
    {screen==='collection'&&<CollectionScreen collection={collection} onBack={()=>setScreen('menu')}/>}
    {screen==='battle'    &&<BattleScreen collection={collection} pool={pool} onBack={()=>setScreen('menu')}/>}
    {screen==='multi'     &&<MultiScreen collection={collection} onBack={()=>setScreen('menu')}/>}
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
