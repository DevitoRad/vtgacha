<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VTuber Gacha — バーチャルガチャ</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#04040f;overflow-x:hidden;font-family:'Rajdhani',sans-serif;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:#04040f;}
::-webkit-scrollbar-thumb{background:#1e1e3f;border-radius:3px;}
@keyframes pulse-glow{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes card-reveal{0%{transform:rotateY(90deg) scale(.85);opacity:0}60%{transform:rotateY(-6deg) scale(1.04)}100%{transform:rotateY(0deg) scale(1);opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes holo{0%{filter:hue-rotate(0deg) brightness(1.1)}50%{filter:hue-rotate(180deg) brightness(1.4)}100%{filter:hue-rotate(360deg) brightness(1.1)}}
@keyframes rainbow-border{0%{border-color:#ff006e;box-shadow:0 0 22px #ff006e,0 0 48px #ff006e44}25%{border-color:#ffe600;box-shadow:0 0 22px #ffe600,0 0 48px #ffe60044}50%{border-color:#00ff88;box-shadow:0 0 22px #00ff88,0 0 48px #00ff8844}75%{border-color:#00cfff;box-shadow:0 0 22px #00cfff,0 0 48px #00cfff44}100%{border-color:#ff006e;box-shadow:0 0 22px #ff006e,0 0 48px #ff006e44}}
@keyframes ur-glow{0%,100%{box-shadow:0 0 16px #ffd700,0 0 36px #ffd70066}50%{box-shadow:0 0 32px #ffd700,0 0 70px #ffd70099}}
@keyframes battle-shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-16px)}40%{transform:translateX(14px)}60%{transform:translateX(-10px)}80%{transform:translateX(8px)}}
@keyframes pop-in{0%{transform:scale(0) rotate(-12deg);opacity:0}70%{transform:scale(1.14) rotate(2deg)}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes slide-up{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes img-fade{from{opacity:0}to{opacity:1}}
.card-reveal{animation:card-reveal .55s cubic-bezier(.34,1.3,.64,1) forwards;}
.float-anim{animation:float 3.5s ease-in-out infinite;}
.holo{animation:holo 3s linear infinite;}
.lr-border{animation:rainbow-border 2.5s linear infinite!important;border-width:2.5px!important;}
.ur-glow{animation:ur-glow 2s ease-in-out infinite;}
.pop-in{animation:pop-in .4s cubic-bezier(.34,1.56,.64,1) forwards;}
.slide-up{animation:slide-up .4s ease forwards;}
.battle-shake{animation:battle-shake .4s ease;}
.shimmer-text{background:linear-gradient(90deg,#ffd700,#fff,#ffd700);background-size:200%;animation:shimmer 2.2s linear infinite;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.img-fade{animation:img-fade .4s ease forwards;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

const WIKI='https://virtualyoutuber.fandom.com/api.php';
const CATEGORIES=['Japanese','English','Indonesian','Korean','Chinese','Filipino'];
const POOL_CACHE_KEY='vtg_pool_v3';
const POOL_CACHE_TTL=6*60*60*1000;
const FALLBACK_EMOJIS=['🌸','⭐','🎮','💎','🔱','👿','🎵','🌙','⚡','🦋','🌊','🔥','❄️','🎪','🌺','⚔️','🎭','🌟','💫','🎯'];

const RC={
  LR: {label:'LEGEND RARE',       color:'#ff006e',textColor:'#ff6eb3',rate:0.8, stars:7},
  UR: {label:'ULTRA RARE',        color:'#ffd700',textColor:'#ffd700',rate:4,   stars:6},
  SSR:{label:'SUPER SPECIAL RARE',color:'#a855f7',textColor:'#c084fc',rate:14,  stars:5},
  SR: {label:'SUPER RARE',        color:'#3b82f6',textColor:'#60a5fa',rate:31,  stars:4},
  R:  {label:'RARE',              color:'#22c55e',textColor:'#4ade80',rate:50.2,stars:3},
};
const RARITY_ORDER=['LR','UR','SSR','SR','R'];

// ── WIKI HELPERS ──────────────────────────────────────────────────────────────
async function fetchCategoryIds(cat) {
  const ids=[];let cont='';
  do {
    const url=`${WIKI}?action=query&list=categorymembers&cmtitle=Category:${encodeURIComponent(cat)}&cmlimit=500&cmtype=page&cmnamespace=0&format=json&origin=*${cont?'&cmcontinue='+encodeURIComponent(cont):''}`;
    try {
      const r=await fetch(url);const d=await r.json();
      (d.query?.categorymembers||[]).forEach(m=>ids.push(m.pageid));
      cont=d.continue?.cmcontinue||'';
    } catch{cont='';}
  } while(cont);
  return ids;
}

async function fetchCards(pageIds) {
  const url=`${WIKI}?action=query&pageids=${pageIds.join('|')}&prop=pageimages|extracts|info&exsentences=2&exintro=1&explaintext=1&piprop=thumbnail&pithumbsize=400&format=json&origin=*`;
  const r=await fetch(url);const d=await r.json();
  return Object.values(d.query?.pages||{}).map(parseWikiPage).filter(Boolean);
}

function parseWikiPage(p) {
  if(p.missing!==undefined||!p.title) return null;
  const len=p.length||500;
  const rarity=len>=60000?'LR':len>=30000?'UR':len>=14000?'SSR':len>=6000?'SR':'R';
  const seed=p.pageid;
  const rng=(s)=>{let x=Math.sin(s)*10000;return x-Math.floor(x);};
  const bases={LR:[9200,8800],UR:[8300,8000],SSR:[7200,7000],SR:[6200,6000],R:[5100,5000]};
  const [ab,db]=bases[rarity];
  const atk=Math.min(9999,Math.round(ab*(0.88+rng(seed)*.24)));
  const def=Math.min(9999,Math.round(db*(0.88+rng(seed+77)*.24)));
  const desc=p.extract||'';
  const agencies=['Hololive','Nijisanji','VShojo','VSPO','Phase Connect','Idol Corp','Prism Project','HOLOSTARS'];
  const agency=agencies.find(a=>desc.includes(a)||p.title.includes(a))||'Independent';
  const color=RC[rarity].color;
  const emoji=FALLBACK_EMOJIS[Math.abs(seed)%FALLBACK_EMOJIS.length];
  return {uid:`wiki_${seed}_${Date.now()}`,id:`wiki_${seed}`,name:p.title,agency,rarity,atk,def,
    desc:desc.substring(0,120),img:p.thumbnail?.source||null,color,emoji};
}

// ── POOL HOOK ─────────────────────────────────────────────────────────────────
function usePool() {
  const [pool,setPool]=useState([]);
  const [status,setStatus]=useState('loading');
  const [progress,setProgress]=useState(0);
  const [totalCount,setTotalCount]=useState(0);
  const [cached,setCached]=useState(false);

  useEffect(()=>{
    try {
      const raw=localStorage.getItem(POOL_CACHE_KEY);
      if(raw){const {ids,ts}=JSON.parse(raw);
        if(Date.now()-ts<POOL_CACHE_TTL&&ids?.length>100){
          setPool(ids);setStatus('ready');setTotalCount(ids.length);setCached(true);return;
        }
      }
    } catch{}
    let done=0;
    Promise.all(CATEGORIES.map(cat=>fetchCategoryIds(cat).then(ids=>{
      done++;setProgress(Math.round((done/CATEGORIES.length)*100));return ids;
    }))).then(results=>{
      const all=[...new Set(results.flat())];
      setPool(all);setStatus('ready');setTotalCount(all.length);
      try{localStorage.setItem(POOL_CACHE_KEY,JSON.stringify({ids:all,ts:Date.now()}));}catch{}
    }).catch(()=>setStatus('ready'));
  },[]);

  return {pool,status,progress,totalCount,cached};
}

// ── STARS ─────────────────────────────────────────────────────────────────────
const Stars=React.memo(()=>{
  const pts=useRef(Array.from({length:70},(_,i)=>({id:i,x:Math.random()*100,y:Math.random()*100,sz:Math.random()*2.2+.3,d:Math.random()*5}))).current;
  return <div style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:0,overflow:'hidden'}}>
    {pts.map(s=><div key={s.id} style={{position:'absolute',left:`${s.x}%`,top:`${s.y}%`,width:s.sz,height:s.sz,borderRadius:'50%',background:'#fff',animation:`pulse-glow ${2+s.d}s ease-in-out infinite`,animationDelay:`${s.d}s`}}/>)}
    <div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse at 50% 0%,rgba(90,40,200,.14) 0%,transparent 65%)'}}/>
    <div style={{position:'absolute',top:'15%',left:'8%',width:450,height:450,borderRadius:'50%',background:'radial-gradient(circle,rgba(110,40,240,.07) 0%,transparent 70%)',filter:'blur(70px)'}}/>
    <div style={{position:'absolute',bottom:'8%',right:'4%',width:380,height:380,borderRadius:'50%',background:'radial-gradient(circle,rgba(0,160,255,.05) 0%,transparent 70%)',filter:'blur(70px)'}}/>
  </div>;
});

// ── STAT BAR ──────────────────────────────────────────────────────────────────
const Bar=({val,color})=><div style={{flex:1,background:'rgba(0,0,0,.5)',borderRadius:4,overflow:'hidden',height:5}}>
  <div style={{height:'100%',width:`${(val/9999)*100}%`,background:`linear-gradient(90deg,${color}88,${color})`,borderRadius:4}}/>
</div>;

// ── CARD IMAGE ────────────────────────────────────────────────────────────────
const CardImage=({card,sm})=>{
  const [loaded,setLoaded]=useState(false);
  const [err,setErr]=useState(false);
  if(!card.img||err) return <div style={{fontSize:sm?40:60,lineHeight:1,filter:`drop-shadow(0 0 14px ${card.color}) drop-shadow(0 0 28px ${card.color}88)`}}>{card.emoji}</div>;
  return <div style={{position:'relative',width:sm?66:88,height:sm?66:88}}>
    {!loaded&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{width:18,height:18,border:`2px solid ${card.color}44`,borderTopColor:card.color,borderRadius:'50%',animation:'spin .8s linear infinite'}}/>
    </div>}
    <img src={card.img} alt={card.name} className={loaded?'img-fade':''} onLoad={()=>setLoaded(true)} onError={()=>setErr(true)}
      style={{width:'100%',height:'100%',objectFit:'cover',borderRadius:'50%',border:`2px solid ${card.color}66`,
        opacity:loaded?1:0,boxShadow:`0 0 16px ${card.color}55`,display:'block'}}/>
  </div>;
};

// ── CARD ──────────────────────────────────────────────────────────────────────
const Card=({card,size='md',revealed=true,onClick,floating=false})=>{
  const r=RC[card.rarity],sm=size==='sm',W=sm?130:195,H=sm?188:282;
  const isLR=card.rarity==='LR',isUR=card.rarity==='UR',isSSR=card.rarity==='SSR';
  if(!revealed) return (
    <div onClick={onClick} style={{width:W,height:H,borderRadius:14,cursor:'pointer',
      background:'linear-gradient(135deg,#0d0d2b,#1a0a2e,#0a0d1f)',border:'2px solid #2d1b69',
      display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:8,
      boxShadow:'0 8px 32px rgba(0,0,0,.7)',flexShrink:0,userSelect:'none',transition:'transform .18s,box-shadow .18s'}}
      onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-5px) scale(1.04)';e.currentTarget.style.boxShadow='0 16px 44px rgba(100,80,255,.35)'}}
      onMouseLeave={e=>{e.currentTarget.style.transform='';e.currentTarget.style.boxShadow='0 8px 32px rgba(0,0,0,.7)'}}>
      <div style={{fontSize:sm?24:40,opacity:.28}}>🎴</div>
      <div style={{color:'#4c4c8a',fontFamily:'Orbitron',fontSize:sm?6:8,letterSpacing:2}}>CLICK TO REVEAL</div>
    </div>
  );
  return (
    <div className={`${isLR?'lr-border':''} ${isUR?'ur-glow':''} ${(isLR||isSSR)?'holo':''} ${floating?'float-anim':''}`}
      onClick={onClick}
      style={{width:W,height:H,borderRadius:14,flexShrink:0,userSelect:'none',
        background:isLR?'linear-gradient(135deg,#1a0033,#0d001a,#001a33)':`linear-gradient(160deg,${card.color}22 0%,#060616 40%,${card.color}0d 100%)`,
        border:`2px solid ${r.color}`,display:'flex',flexDirection:'column',overflow:'hidden',
        position:'relative',cursor:onClick?'pointer':'default',
        boxShadow:`0 0 22px ${r.color}44,0 8px 32px rgba(0,0,0,.7)`,transition:'transform .18s,box-shadow .18s'}}
      onMouseEnter={e=>{if(onClick)e.currentTarget.style.transform='translateY(-6px) scale(1.04)'}}
      onMouseLeave={e=>{e.currentTarget.style.transform=''}}>
      {(isLR||isUR||isSSR)&&<div style={{position:'absolute',inset:0,borderRadius:12,pointerEvents:'none',zIndex:1,
        background:'linear-gradient(105deg,transparent 40%,rgba(255,255,255,.07) 50%,transparent 60%)',
        backgroundSize:'200% 100%',animation:'shimmer 3.5s infinite'}}/>}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:sm?'5px 8px':'7px 10px',zIndex:2}}>
        <div style={{background:r.color,color:'#000',fontFamily:'Orbitron',fontSize:sm?6:8,fontWeight:900,padding:'2px 6px',borderRadius:4,letterSpacing:1}}>{card.rarity}</div>
        <div style={{display:'flex',gap:2}}>{Array.from({length:Math.min(r.stars,5)}).map((_,i)=><span key={i} style={{color:r.color,fontSize:sm?7:9}}>★</span>)}</div>
      </div>
      <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',zIndex:2,
        background:`radial-gradient(ellipse at center,${card.color}1e 0%,transparent 70%)`,padding:'0 8px',overflow:'hidden'}}>
        <CardImage card={card} sm={sm}/>
        <div style={{marginTop:7,color:'#fff',fontFamily:'Orbitron',fontWeight:700,fontSize:sm?8:11,
          textAlign:'center',lineHeight:1.3,textShadow:`0 0 12px ${card.color}`}}>
          {card.name.length>(sm?17:25)?card.name.substring(0,sm?15:23)+'…':card.name}
        </div>
        <div style={{color:card.color,fontFamily:'Rajdhani',fontSize:sm?8:10,fontWeight:700,letterSpacing:1,opacity:.9,marginTop:2}}>{card.agency}</div>
        {!sm&&card.desc&&<div style={{color:'#8899bb',fontSize:9,fontFamily:'Rajdhani',textAlign:'center',
          padding:'5px 2px 0',lineHeight:1.5,opacity:.72,overflow:'hidden',maxHeight:42}}>
          {card.desc.substring(0,88)}{card.desc.length>88?'…':''}
        </div>}
      </div>
      <div style={{padding:sm?'4px 8px 6px':'6px 10px 8px',background:'rgba(0,0,0,.55)',zIndex:2,borderTop:`1px solid ${r.color}33`}}>
        {[['ATK','#ff6b6b',card.atk],['DEF','#6bcfff',card.def]].map(([l,c,v])=>(
          <div key={l} style={{display:'flex',gap:4,alignItems:'center',marginBottom:l==='ATK'?(sm?2:4):0}}>
            <div style={{color:c,fontFamily:'Orbitron',fontSize:sm?6:8,fontWeight:700,width:sm?22:28}}>{l}</div>
            <Bar val={v} color={c}/>
            <div style={{color:c,fontFamily:'Rajdhani',fontSize:sm?9:11,fontWeight:700,width:sm?28:35,textAlign:'right'}}>{v.toLocaleString()}</div>
          </div>
        ))}
      </div>
    </div>
  );
};

// ── SHARED UI ─────────────────────────────────────────────────────────────────
const BackBtn=({onClick})=><button onClick={onClick} style={{background:'rgba(255,255,255,.04)',border:'1px solid #222',borderRadius:8,padding:'7px 14px',cursor:'pointer',fontFamily:'Orbitron',fontSize:10,color:'#667',letterSpacing:1,transition:'all .2s'}} onMouseEnter={e=>{e.currentTarget.style.color='#fff';e.currentTarget.style.borderColor='#445'}} onMouseLeave={e=>{e.currentTarget.style.color='#667';e.currentTarget.style.borderColor='#222'}}>← BACK</button>;
const ActBtn=({onClick,color,label,disabled,small})=><button onClick={onClick} disabled={disabled} style={{background:`linear-gradient(135deg,${color}33,${color}11)`,border:`1px solid ${color}55`,borderRadius:10,padding:small?'8px 18px':'11px 26px',cursor:disabled?'not-allowed':'pointer',fontFamily:'Orbitron',fontWeight:700,fontSize:small?10:11,color:'#fff',letterSpacing:1,transition:'all .2s',boxShadow:`0 4px 16px ${color}33`,opacity:disabled?.45:1}} onMouseEnter={e=>{if(!disabled){e.currentTarget.style.transform='translateY(-2px)';e.currentTarget.style.boxShadow=`0 8px 26px ${color}55`}}} onMouseLeave={e=>{e.currentTarget.style.transform='';e.currentTarget.style.boxShadow=`0 4px 16px ${color}33`}}>{label}</button>;

// ── MENU ──────────────────────────────────────────────────────────────────────
const MenuScreen=({collection,totalPulls,status,progress,totalCount,cached,onGacha,onCollection,onBattle})=>{
  const ready=status==='ready';
  return <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:22,padding:'36px 20px',minHeight:'100vh',justifyContent:'center',position:'relative',zIndex:2}}>
    <div className="float-anim" style={{textAlign:'center'}}>
      <div style={{fontFamily:'Orbitron',fontWeight:900,fontSize:'clamp(28px,5vw,54px)',letterSpacing:4,lineHeight:1.05}}>
        <span className="shimmer-text">VTUBER</span><br/>
        <span style={{color:'#fff',textShadow:'0 0 30px #a855f7'}}>GACHA</span>
      </div>
      <div style={{color:'#443388',fontFamily:'Rajdhani',fontSize:11,letterSpacing:5,marginTop:7,fontWeight:600}}>バーチャルガチャ</div>
    </div>

    <div style={{background:'rgba(255,255,255,.03)',border:'1px solid #1a1a3a',borderRadius:10,padding:'12px 24px',textAlign:'center',minWidth:260}}>
      {!ready?<>
        <div style={{fontFamily:'Rajdhani',color:'#556',fontSize:12,marginBottom:8}}>Scanning VTuber wiki...</div>
        <div style={{background:'#0a0a1e',borderRadius:20,height:6,overflow:'hidden',width:200,margin:'0 auto'}}>
          <div style={{height:'100%',width:`${progress}%`,background:'linear-gradient(90deg,#7c3aed,#a855f7)',borderRadius:20,transition:'width .5s'}}/>
        </div>
        <div style={{fontFamily:'Orbitron',fontSize:10,color:'#445',marginTop:6}}>{progress}%</div>
      </>:<>
        <div style={{fontFamily:'Orbitron',fontWeight:900,fontSize:26,color:'#a855f7'}}>{totalCount.toLocaleString()}</div>
        <div style={{fontFamily:'Rajdhani',fontSize:10,color:'#445',letterSpacing:2}}>VTUBERS IN POOL{cached?' · CACHED':''}</div>
      </>}
    </div>

    <div style={{display:'flex',gap:14,flexWrap:'wrap',justifyContent:'center'}}>
      {[{l:'CARDS',v:collection.length,c:'#a855f7'},{l:'PULLS',v:totalPulls,c:'#ffd700'}].map(s=>(
        <div key={s.l} style={{textAlign:'center',background:'rgba(255,255,255,.03)',border:`1px solid ${s.c}33`,borderRadius:10,padding:'10px 18px'}}>
          <div style={{fontFamily:'Orbitron',fontWeight:900,fontSize:22,color:s.c}}>{s.v}</div>
          <div style={{fontFamily:'Rajdhani',fontSize:10,color:'#445',letterSpacing:2}}>{s.l}</div>
        </div>
      ))}
    </div>

    <div style={{display:'flex',flexDirection:'column',gap:12,width:'100%',maxWidth:300}}>
      {[
        {fn:onGacha,     c:'#a855f7',icon:'🎴',l:'OPEN PACK',  sub:'5 cards per pull',  dis:!ready},
        {fn:onCollection,c:'#ffd700',icon:'📚',l:'COLLECTION', sub:`${collection.length} cards owned`,dis:collection.length===0},
        {fn:onBattle,    c:'#ef4444',icon:'⚔️',l:'BATTLE',     sub:'Fight a random VTuber',dis:collection.length===0||!ready},
      ].map(b=>(
        <button key={b.l} onClick={!b.dis?b.fn:undefined}
          style={{background:b.dis?'rgba(255,255,255,.02)':`linear-gradient(135deg,${b.c}22,${b.c}11)`,border:`1px solid ${b.dis?'#1a1a3a':b.c+'66'}`,borderRadius:12,padding:'14px 20px',cursor:b.dis?'not-allowed':'pointer',display:'flex',alignItems:'center',gap:12,width:'100%',opacity:b.dis?.38:1,transition:'all .2s',boxShadow:b.dis?'none':`0 4px 20px ${b.c}22`}}
          onMouseEnter={e=>{if(!b.dis){e.currentTarget.style.transform='translateY(-2px)';e.currentTarget.style.boxShadow=`0 8px 30px ${b.c}44`}}}
          onMouseLeave={e=>{e.currentTarget.style.transform='';e.currentTarget.style.boxShadow=b.dis?'none':`0 4px 20px ${b.c}22`}}>
          <span style={{fontSize:24}}>{b.icon}</span>
          <div style={{textAlign:'left'}}>
            <div style={{fontFamily:'Orbitron',fontWeight:700,color:'#fff',fontSize:12,letterSpacing:1}}>{b.l}</div>
            <div style={{fontFamily:'Rajdhani',color:b.dis?'#334':b.c+'aa',fontSize:12,marginTop:2}}>{b.sub}</div>
          </div>
        </button>
      ))}
    </div>

    <div style={{display:'flex',gap:7,flexWrap:'wrap',justifyContent:'center',maxWidth:360}}>
      {RARITY_ORDER.map(k=>{const v=RC[k];return(
        <div key={k} style={{display:'flex',alignItems:'center',gap:5,background:'rgba(255,255,255,.02)',borderRadius:6,padding:'3px 8px',border:`1px solid ${v.color}33`}}>
          <div style={{width:6,height:6,borderRadius:'50%',background:v.color}}/>
          <span style={{fontFamily:'Orbitron',fontSize:8,color:v.color}}>{k}</span>
          <span style={{fontFamily:'Rajdhani',fontSize:9,color:'#445',marginLeft:1}}>{v.rate}%</span>
        </div>
      );})}
    </div>
    <div style={{color:'#1e2040',fontFamily:'Rajdhani',fontSize:10,textAlign:'center',letterSpacing:1}}>Data · Virtual YouTuber Wiki (CC BY-SA) · Images via Fandom</div>
  </div>;
};

// ── PACK ──────────────────────────────────────────────────────────────────────
const PackScreen=({pool,onBack,onAdd})=>{
  const [phase,setPhase]=useState('ready');
  const [cards,setCards]=useState([]);
  const [revealed,setRevealed]=useState([]);
  const [animKey,setAnimKey]=useState(0);
  const [loading,setLoading]=useState(false);
  const prefetchRef=useRef(null);

  const pickIds=useCallback((n=5)=>{
    if(!pool.length) return [];
    const picked=new Set();
    while(picked.size<Math.min(n,pool.length)) picked.add(pool[Math.floor(Math.random()*pool.length)]);
    return [...picked];
  },[pool]);

  const prefetch=useCallback(()=>{
    if(pool.length) prefetchRef.current=fetchCards(pickIds(5));
  },[pool,pickIds]);

  useEffect(()=>{ prefetch(); },[prefetch]);

  const open=async()=>{
    setLoading(true);setCards([]);setRevealed([]);setPhase('opening');setAnimKey(k=>k+1);
    try {
      const result=prefetchRef.current ? await prefetchRef.current : await fetchCards(pickIds(5));
      prefetchRef.current=null;
      setCards(result.filter(Boolean));
      setLoading(false);
      setTimeout(prefetch,300);
    } catch{setLoading(false);setPhase('ready');}
  };

  const revealOne=(i)=>{
    const n=[...revealed,i];setRevealed(n);
    if(n.length===cards.length) setTimeout(()=>setPhase('done'),400);
  };
  const revealAll=()=>{setRevealed(cards.map((_,i)=>i));setTimeout(()=>setPhase('done'),400);};
  const addAll=()=>{onAdd(cards);onBack();};

  return <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',padding:'26px 16px',position:'relative',zIndex:2}}>
    <div style={{width:'100%',maxWidth:860,display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
      <BackBtn onClick={onBack}/>
      <div style={{fontFamily:'Orbitron',fontWeight:700,fontSize:13,color:'#fff',letterSpacing:3}}>PACK OPENING</div>
      <div style={{width:60}}/>
    </div>

    {phase==='ready'&&<div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:28}}>
      <div className="float-anim" style={{fontSize:94,filter:'drop-shadow(0 0 32px #a855f7)'}}>🎴</div>
      <div style={{textAlign:'center'}}>
        <div style={{fontFamily:'Orbitron',fontSize:18,color:'#fff',fontWeight:700}}>MYSTERY PACK</div>
        <div style={{fontFamily:'Rajdhani',fontSize:13,color:'#556',marginTop:5}}>5 cards from {pool.length.toLocaleString()} VTubers</div>
      </div>
      <button onClick={open} style={{background:'linear-gradient(135deg,#7c3aed,#a855f7)',border:'none',borderRadius:14,padding:'15px 54px',cursor:'pointer',fontFamily:'Orbitron',fontWeight:700,fontSize:14,color:'#fff',letterSpacing:2,boxShadow:'0 8px 32px #a855f777',transition:'all .2s'}}
        onMouseEnter={e=>{e.currentTarget.style.transform='scale(1.07)';e.currentTarget.style.boxShadow='0 14px 44px #a855f799'}}
        onMouseLeave={e=>{e.currentTarget.style.transform='';e.currentTarget.style.boxShadow='0 8px 32px #a855f777'}}>
        OPEN PACK
      </button>
    </div>}

    {(phase==='opening'||phase==='done')&&<div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:18,width:'100%'}}>
      {loading&&<div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:14,padding:40}}>
        <div style={{width:36,height:36,border:'3px solid #1a0a3e',borderTopColor:'#a855f7',borderRadius:'50%',animation:'spin .7s linear infinite'}}/>
        <div style={{fontFamily:'Orbitron',fontSize:11,color:'#556',letterSpacing:3}}>DRAWING CARDS...</div>
      </div>}
      {!loading&&cards.length>0&&<>
        <div style={{display:'flex',gap:10,flexWrap:'wrap',justifyContent:'center',alignItems:'flex-end'}}>
          {cards.map((card,i)=>{
            const isRev=revealed.includes(i);const r=RC[card.rarity];
            return <div key={`${animKey}_${i}`} style={{position:'relative'}}>
              {isRev?<div className="card-reveal"><Card card={card}/></div>:<Card card={card} revealed={false} onClick={()=>revealOne(i)}/>}
              {isRev&&(card.rarity==='LR'||card.rarity==='UR')&&<div className="pop-in" style={{position:'absolute',top:-16,left:'50%',transform:'translateX(-50%)',background:r.color,color:'#000',fontFamily:'Orbitron',fontSize:8,fontWeight:900,padding:'3px 10px',borderRadius:20,whiteSpace:'nowrap',boxShadow:`0 0 14px ${r.color}`,zIndex:10}}>{r.label}!!</div>}
            </div>;
          })}
        </div>
        <div style={{display:'flex',gap:11,marginTop:8,flexWrap:'wrap',justifyContent:'center'}}>
          {phase==='opening'&&revealed.length<cards.length&&<ActBtn onClick={revealAll} color="#a855f7" label="Reveal All"/>}
          {phase==='done'&&<><ActBtn onClick={addAll} color="#22c55e" label="✓ Add to Collection"/><ActBtn onClick={open} color="#a855f7" label="Open Another Pack"/></>}
        </div>
        {phase==='done'&&<div className="slide-up" style={{display:'flex',gap:7,flexWrap:'wrap',justifyContent:'center'}}>
          {cards.map((c,i)=>{const r=RC[c.rarity];return <div key={i} style={{background:`${r.color}22`,border:`1px solid ${r.color}55`,borderRadius:8,padding:'4px 11px',fontFamily:'Rajdhani',fontSize:12,color:r.textColor,fontWeight:600}}>{c.rarity} · {c.name.split(' ').slice(0,2).join(' ')}</div>;})}
        </div>}
      </>}
    </div>}
  </div>;
};

// ── COLLECTION ────────────────────────────────────────────────────────────────
const CollectionScreen=({collection,onBack})=>{
  const [filter,setFilter]=useState('ALL');
  const filtered=filter==='ALL'?collection:collection.filter(c=>c.rarity===filter);
  const sorted=[...filtered].sort((a,b)=>RARITY_ORDER.indexOf(a.rarity)-RARITY_ORDER.indexOf(b.rarity));
  const cnts={};RARITY_ORDER.forEach(r=>{cnts[r]=collection.filter(c=>c.rarity===r).length;});
  return <div style={{minHeight:'100vh',padding:'24px 16px',position:'relative',zIndex:2}}>
    <div style={{maxWidth:960,margin:'0 auto'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <BackBtn onClick={onBack}/>
        <div style={{fontFamily:'Orbitron',fontWeight:700,fontSize:13,color:'#fff',letterSpacing:3}}>COLLECTION <span style={{color:'#a855f7'}}>({collection.length})</span></div>
        <div style={{width:60}}/>
      </div>
      <div style={{display:'flex',gap:7,marginBottom:20,flexWrap:'wrap',justifyContent:'center'}}>
        {['ALL',...RARITY_ORDER].map(r=>{const rc=r==='ALL'?null:RC[r];const cnt=r==='ALL'?collection.length:(cnts[r]||0);const on=filter===r;return(
          <button key={r} onClick={()=>setFilter(r)} style={{background:on?(rc?rc.color:'#a855f7'):'rgba(255,255,255,.04)',border:`1px solid ${rc?rc.color+'66':'#333'}`,borderRadius:20,padding:'4px 12px',cursor:'pointer',fontFamily:'Orbitron',fontSize:9,fontWeight:700,color:on?'#000':(rc?rc.color:'#667'),transition:'all .2s'}}>
            {r}{cnt>0&&<span style={{opacity:.7}}> ({cnt})</span>}
          </button>
        );})}
      </div>
      {sorted.length===0
        ?<div style={{textAlign:'center',color:'#334',fontFamily:'Rajdhani',fontSize:16,marginTop:50}}>No cards yet — open some packs!</div>
        :<div style={{display:'flex',flexWrap:'wrap',gap:10,justifyContent:'center'}}>{sorted.map(c=><Card key={c.uid} card={c} size="sm"/>)}</div>}
    </div>
  </div>;
};

// ── BATTLE ────────────────────────────────────────────────────────────────────
const BattleScreen=({collection,pool,onBack})=>{
  const [phase,setPhase]=useState('select');
  const [myCard,setMyCard]=useState(null);
  const [oppCard,setOppCard]=useState(null);
  const [result,setResult]=useState(null);
  const [log,setLog]=useState([]);
  const [hitAnim,setHitAnim]=useState('');
  const [oppLoading,setOppLoading]=useState(false);
  const RR={win:{label:'VICTORY!',color:'#22c55e',emoji:'🏆'},lose:{label:'DEFEATED',color:'#ef4444',emoji:'💀'},draw:{label:'DRAW',color:'#f59e0b',emoji:'🤝'}};

  const fight=async(card)=>{
    setMyCard(card);setPhase('fighting');setOppLoading(true);
    try {
      const ids=[pool[Math.floor(Math.random()*pool.length)]];
      const [opp]=await fetchCards(ids);
      setOppCard(opp||card);setOppLoading(false);
      setTimeout(()=>{
        const rng=()=>.75+Math.random()*.5;
        const mA=card.atk*rng(),mD=card.def*rng(),oA=(opp?.atk||5000)*rng(),oD=(opp?.def||5000)*rng();
        const mT=mA+mD,oT=oA+oD;
        const outcome=mT>oT*1.05?'win':mT<oT*.95?'lose':'draw';
        setHitAnim(outcome==='win'?'opp':outcome==='lose'?'mine':'');
        setResult(outcome);
        setLog([`⚔️  ${card.name} ATK: ${Math.round(mA).toLocaleString()}`,`🛡️  ${card.name} DEF: ${Math.round(mD).toLocaleString()}`,`⚔️  ${opp?.name||'???'} ATK: ${Math.round(oA).toLocaleString()}`,`🛡️  ${opp?.name||'???'} DEF: ${Math.round(oD).toLocaleString()}`,`📊  Your score: ${Math.round(mT).toLocaleString()} vs Opp: ${Math.round(oT).toLocaleString()}`]);
        setPhase('result');
      },1800);
    } catch{setOppLoading(false);setPhase('select');}
  };
  const reset=()=>{setPhase('select');setMyCard(null);setOppCard(null);setResult(null);setLog([]);setHitAnim('');};

  return <div style={{minHeight:'100vh',padding:'24px 16px',position:'relative',zIndex:2}}>
    <div style={{maxWidth:860,margin:'0 auto',display:'flex',flexDirection:'column',alignItems:'center',gap:18}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',width:'100%'}}>
        <BackBtn onClick={onBack}/>
        <div style={{fontFamily:'Orbitron',fontWeight:700,fontSize:13,color:'#fff',letterSpacing:3}}>BATTLE</div>
        <div style={{width:60}}/>
      </div>
      {phase==='select'&&<>
        <div style={{fontFamily:'Rajdhani',color:'#667',fontSize:14,textAlign:'center'}}>Pick your fighter — highest ATK + DEF wins!</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:10,justifyContent:'center'}}>
          {[...collection].sort((a,b)=>(b.atk+b.def)-(a.atk+a.def)).map(c=>(
            <div key={c.uid} style={{position:'relative',cursor:'pointer'}} onClick={()=>fight(c)}>
              <Card card={c} size="sm"/>
              <div style={{position:'absolute',bottom:38,left:'50%',transform:'translateX(-50%)',background:'rgba(0,0,0,.88)',borderRadius:6,padding:'2px 7px',fontFamily:'Rajdhani',fontSize:10,color:'#fff',whiteSpace:'nowrap',fontWeight:700}}>PWR {(c.atk+c.def).toLocaleString()}</div>
            </div>
          ))}
        </div>
      </>}
      {(phase==='fighting'||phase==='result')&&myCard&&<>
        <div style={{display:'flex',alignItems:'center',gap:20,flexWrap:'wrap',justifyContent:'center',width:'100%'}}>
          <div className={phase==='result'&&hitAnim==='mine'?'battle-shake':''} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8}}>
            <div style={{fontFamily:'Orbitron',fontSize:10,color:'#22c55e',letterSpacing:2}}>YOU</div>
            <Card card={myCard} floating={phase==='fighting'}/>
          </div>
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8,minWidth:90}}>
            {phase==='fighting'&&<div style={{fontFamily:'Orbitron',fontSize:34,fontWeight:900,color:'#ef4444',textShadow:'0 0 22px #ef4444'}}>VS</div>}
            {phase==='result'&&result&&<div className="pop-in" style={{textAlign:'center'}}>
              <div style={{fontSize:44}}>{RR[result].emoji}</div>
              <div style={{fontFamily:'Orbitron',fontWeight:900,fontSize:19,color:RR[result].color,textShadow:`0 0 20px ${RR[result].color}`}}>{RR[result].label}</div>
            </div>}
          </div>
          <div className={phase==='result'&&hitAnim==='opp'?'battle-shake':''} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8}}>
            <div style={{fontFamily:'Orbitron',fontSize:10,color:'#ef4444',letterSpacing:2}}>OPP</div>
            {oppLoading
              ?<div style={{width:195,height:282,borderRadius:14,background:'linear-gradient(135deg,#0d0d2b,#1a0a2e)',border:'2px solid #2d1b69',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:12}}>
                <div style={{width:28,height:28,border:'3px solid #1a0a3e',borderTopColor:'#a855f7',borderRadius:'50%',animation:'spin .7s linear infinite'}}/>
                <div style={{fontFamily:'Orbitron',fontSize:9,color:'#445',letterSpacing:2}}>LOADING...</div>
              </div>
              :oppCard&&<Card card={oppCard} revealed={phase==='result'} floating={phase==='fighting'}/>}
          </div>
        </div>
        {phase==='result'&&log.length>0&&<div className="slide-up" style={{background:'rgba(255,255,255,.02)',border:'1px solid #1e1e3f',borderRadius:12,padding:'13px 18px',width:'100%',maxWidth:500}}>
          {log.map((l,i)=><div key={i} style={{fontFamily:'Rajdhani',fontSize:12,color:'#556',lineHeight:2}}>{l}</div>)}
        </div>}
        {phase==='result'&&<div style={{display:'flex',gap:11,flexWrap:'wrap',justifyContent:'center'}}>
          <ActBtn onClick={reset} color="#a855f7" label="Battle Again"/>
          <ActBtn onClick={onBack} color="#444" label="Back to Menu" small/>
        </div>}
        {phase==='fighting'&&!oppLoading&&<div style={{fontFamily:'Orbitron',fontSize:11,color:'#445',letterSpacing:4,animation:'pulse-glow 1s ease-in-out infinite'}}>CALCULATING...</div>}
      </>}
    </div>
  </div>;
};

// ── ROOT ──────────────────────────────────────────────────────────────────────
function App(){
  const [screen,setScreen]=useState('menu');
  const [collection,setCollection]=useState([]);
  const [totalPulls,setTotalPulls]=useState(0);
  const {pool,status,progress,totalCount,cached}=usePool();
  const addCards=(cards)=>{setCollection(p=>[...p,...cards]);setTotalPulls(p=>p+cards.length);};
  return <div style={{minHeight:'100vh',background:'#04040f',position:'relative'}}>
    <Stars/>
    {screen==='menu'&&<MenuScreen collection={collection} totalPulls={totalPulls} status={status} progress={progress} totalCount={totalCount} cached={cached} onGacha={()=>setScreen('pack')} onCollection={()=>setScreen('collection')} onBattle={()=>setScreen('battle')}/>}
    {screen==='pack'&&<PackScreen pool={pool} onBack={()=>setScreen('menu')} onAdd={addCards}/>}
    {screen==='collection'&&<CollectionScreen collection={collection} onBack={()=>setScreen('menu')}/>}
    {screen==='battle'&&<BattleScreen collection={collection} pool={pool} onBack={()=>setScreen('menu')}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
