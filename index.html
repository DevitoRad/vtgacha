<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Elysium TCG — Vanguard Engine</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<style>
/* ═══════════════════════════════════════════════════════════
   ELYSIUM UI & SHADERS
═══════════════════════════════════════════════════════════ */
:root {
    --bg-dark: #050508;
    --gold: #FFD700;
    --cyan: #00F0FF;
    --magenta: #FF00FF;
}

body {
    margin: 0;
    overflow: hidden;
    background: var(--bg-dark);
    color: white;
    font-family: 'Inter', sans-serif;
    user-select: none;
}

/* Glassmorphism Pills */
.user-info-top {
    display: flex;
    gap: 15px;
    position: absolute;
    top: 2rem;
    right: 2rem;
    z-index: 10;
}

.pill {
    background: rgba(15, 15, 20, 0.6);
    backdrop-filter: blur(12px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 50px;
    padding: 10px 20px;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    gap: 8px;
}

/* Slanted Side Navigation */
.side-menu-slanted {
    position: absolute;
    right: 2rem;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 15px;
    z-index: 10;
}

.menu-btn {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.5rem;
    padding: 15px 50px;
    text-align: right;
    cursor: pointer;
    transform: skewX(-10deg);
    transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
}

.menu-btn span {
    display: block;
    transform: skewX(10deg);
}

.menu-btn:hover, .menu-btn.active {
    background: rgba(255, 255, 255, 0.9);
    color: #000;
    transform: skewX(-10deg) translateX(-15px);
    box-shadow: -5px 0 30px rgba(0, 240, 255, 0.4);
}

/* The Museum Gallery Layout */
.gallery-container {
    padding: 100px 50px;
    display: flex;
    flex-wrap: wrap;
    gap: 40px;
    justify-content: center;
    height: 100vh;
    overflow-y: auto;
}

.card-wrapper {
    width: 200px;
    height: 280px;
    position: relative;
    border-radius: 12px;
    transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
    transform: scale(0.95) rotateY(0deg);
    perspective: 1000px;
    cursor: pointer;
    background: #111;
    overflow: hidden;
    box-shadow: 0 10px 20px rgba(0,0,0,0.8);
    border: 1px solid rgba(255,255,255,0.1);
}

.card-wrapper:hover {
    transform: scale(1.1) translateY(-10px);
    z-index: 100;
    box-shadow: 0 20px 40px rgba(0, 240, 255, 0.3);
}

.card-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
}

/* The Holographic Foil Shader */
.card-foil-overlay {
    position: absolute;
    inset: 0;
    z-index: 5;
    background: linear-gradient(
        125deg,
        rgba(255, 0, 255, 0) 0%,
        rgba(0, 255, 255, 0.3) 45%,
        rgba(255, 255, 255, 0.8) 50%,
        rgba(0, 255, 255, 0.3) 55%,
        rgba(255, 0, 255, 0) 100%
    );
    background-size: 250% 250%;
    mix-blend-mode: color-dodge;
    transition: background-position 0.1s ease;
    pointer-events: none;
    opacity: 0.8;
}

.screen-flash {
    position: fixed;
    inset: 0;
    background: white;
    z-index: 999;
    pointer-events: none;
    animation: flashFade 1.5s cubic-bezier(0.19, 1, 0.22, 1) forwards;
}

@keyframes flashFade {
    0% { opacity: 1; }
    100% { opacity: 0; }
}

.instruction-text {
    position: absolute;
    bottom: 15%;
    width: 100%;
    text-align: center;
    font-family: 'Orbitron', sans-serif;
    color: rgba(255,255,255,0.7);
    letter-spacing: 3px;
    pointer-events: none;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

// --- DUMMY DATA POOL ---
const DB = [
    { id: 'c1', name: 'Gura - Apex', rarity: 'APEX', img: 'https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?w=400&q=80' },
    { id: 'c2', name: 'Ina - Rare', rarity: 'RARE', img: 'https://images.unsplash.com/photo-1578632767115-351597cf2477?w=400&q=80' },
    { id: 'c3', name: 'Kiara - Common', rarity: 'COMMON', img: 'https://images.unsplash.com/photo-1580477651842-8c9bc811a22d?w=400&q=80' },
    { id: 'c4', name: 'Calli - Common', rarity: 'COMMON', img: 'https://images.unsplash.com/photo-1618331835717-801e976710b2?w=400&q=80' },
    { id: 'c5', name: 'Ame - Apex', rarity: 'APEX', img: 'https://images.unsplash.com/photo-1542736667-069246b59e41?w=400&q=80' }
];

// --- SHADER COMPONENT ---
const Card = ({ card }) => {
    const cardRef = useRef(null);
    const [bgPos, setBgPos] = useState('50% 50%');

    const handleMouseMove = (e) => {
        if (!cardRef.current) return;
        const rect = cardRef.current.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const xPercent = (x / rect.width) * 100;
        const yPercent = (y / rect.height) * 100;
        setBgPos(`${xPercent}% ${yPercent}%`);
    };

    return (
        <div className="card-wrapper" ref={cardRef} onMouseMove={handleMouseMove} onMouseLeave={() => setBgPos('50% 50%')}>
            <img src={card.img} className="card-image" alt={card.name} />
            <div style={{
                position: 'absolute', bottom: 0, width: '100%', padding: '10px', 
                background: 'linear-gradient(transparent, rgba(0,0,0,0.9))', color: card.rarity === 'APEX' ? 'gold' : 'white',
                fontFamily: 'Bebas Neue', fontSize: '1.5rem', textAlign: 'center'
            }}>
                {card.name}
            </div>
            {(card.rarity === 'APEX' || card.rarity === 'RARE') && (
                <div className="card-foil-overlay" style={{ backgroundPosition: bgPos }}></div>
            )}
        </div>
    );
};

// --- SCREENS ---
const MenuScreen = ({ onSummon, onCollection, dust }) => (
    <nav className="main-hub">
        <div className="user-info-top">
            <div className="pill">✨ {dust} ASTRAL DUST</div>
            <div className="pill">⚡ 10/10 PACKS</div>
        </div>

        <div className="side-menu-slanted">
            <button className="menu-btn active" onClick={onSummon}><span>SUMMON</span></button>
            <button className="menu-btn collection" onClick={onCollection}><span>ARCHIVES</span></button>
        </div>
    </nav>
);

const CollectionScreen = ({ collection, onBack }) => (
    <div style={{position:'absolute', inset:0, background:'rgba(5,5,8,0.95)', backdropFilter:'blur(10px)', zIndex:20}}>
        <button onClick={onBack} style={{position:'absolute', top:'2rem', left:'2rem', padding:'10px 20px', background:'transparent', border:'1px solid white', color:'white', fontFamily:'Orbitron', cursor:'pointer', zIndex:30}}>← BACK TO HUB</button>
        <div className="gallery-container">
            {collection.length === 0 ? <h2 style={{color:'white', fontFamily:'Orbitron', marginTop:'20vh'}}>NO CARDS ACQUIRED YET</h2> : null}
            {collection.map((c, i) => <Card key={i} card={c} />)}
        </div>
    </div>
);

// --- THE 3D TACTILE PACK SCREEN ---
const PackScreen = ({ onBack, onPullComplete }) => {
    const containerRef = useRef();
    const [isFlashing, setIsFlashing] = useState(false);
    const [showCard, setShowCard] = useState(null);

    useEffect(() => {
        // 1. Scene Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.z = 8;
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        containerRef.current.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(2, 5, 5);
        scene.add(dirLight);

        // Core Pack Material (Brushed Foil)
        const packMat = new THREE.MeshStandardMaterial({ 
            color: 0x111122, 
            roughness: 0.2, 
            metalness: 0.8 
        });

        // Pack Geometry (Split into Body and Flap)
        const packGroup = new THREE.Group();
        
        const bodyGeo = new THREE.BoxGeometry(3, 4, 0.2);
        const bodyMesh = new THREE.Mesh(bodyGeo, packMat);
        bodyMesh.position.y = -0.5;
        packGroup.add(bodyMesh);

        const flapGeo = new THREE.BoxGeometry(3, 1, 0.25);
        const flapMesh = new THREE.Mesh(flapGeo, new THREE.MeshStandardMaterial({color: 0x333344, metalness: 0.9}));
        flapMesh.position.y = 2; // Top of the pack
        packGroup.add(flapMesh);

        scene.add(packGroup);

        // Variables for the "Rip" logic
        let isDragging = false;
        let startX = 0;
        let currentDrag = 0;
        let isRipped = false;

        // Interaction logic
        const onDown = (e) => {
            if (isRipped) return;
            isDragging = true;
            startX = e.clientX || e.touches[0].clientX;
            document.body.style.cursor = 'grabbing';
        };

        const onMove = (e) => {
            if (!isDragging || isRipped) return;
            const x = e.clientX || e.touches[0].clientX;
            const delta = x - startX;
            
            // Only allow right-drag (The Rip)
            if (delta > 0) {
                currentDrag = delta * 0.01; // Scale pixel delta to 3D space
                flapMesh.position.x = currentDrag;
                flapMesh.rotation.z = -currentDrag * 0.1; // Slight tilt as it tears
                
                // STAGE 2: THE SNAP
                if (currentDrag > 2.5) {
                    isRipped = true;
                    isDragging = false;
                    document.body.style.cursor = 'default';
                    triggerSnap();
                }
            }
        };

        const onUp = () => {
            if (!isRipped) {
                // Snap back if they didn't tear it all the way
                isDragging = false;
                document.body.style.cursor = 'grab';
                flapMesh.position.x = 0;
                flapMesh.rotation.z = 0;
            }
        };

        const triggerSnap = () => {
            setIsFlashing(true);
            
            // Execute the pull logic after the flash covers the screen
            setTimeout(() => {
                const pulled = onPullComplete();
                setShowCard(pulled);
            }, 500);
        };

        // Add listeners
        window.addEventListener('mousedown', onDown);
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
        window.addEventListener('touchstart', onDown);
        window.addEventListener('touchmove', onMove);
        window.addEventListener('touchend', onUp);

        // Animation Loop
        const animate = () => {
            requestAnimationFrame(animate);
            // Ambient floating
            if (!isRipped && !isDragging) {
                packGroup.rotation.y = Math.sin(Date.now() * 0.001) * 0.1;
                packGroup.position.y = Math.sin(Date.now() * 0.002) * 0.1;
            } else if (isRipped) {
                // Flap flies away
                flapMesh.position.x += 0.2;
                flapMesh.position.y += 0.1;
                flapMesh.rotation.z -= 0.1;
            }
            renderer.render(scene, camera);
        };
        animate();

        return () => {
            window.removeEventListener('mousedown', onDown);
            window.removeEventListener('mousemove', onMove);
            window.removeEventListener('mouseup', onUp);
            window.removeEventListener('touchstart', onDown);
            window.removeEventListener('touchmove', onMove);
            window.removeEventListener('touchend', onUp);
            containerRef.current.removeChild(renderer.domElement);
        };
    }, []);

    return (
        <div style={{position:'absolute', inset:0, background:'#000', zIndex:20}}>
            <button onClick={onBack} style={{position:'absolute', top:'2rem', left:'2rem', padding:'10px 20px', background:'transparent', border:'1px solid white', color:'white', fontFamily:'Orbitron', cursor:'pointer', zIndex:30}}>← ABORT SUMMON</button>
            <div ref={containerRef} style={{width:'100%', height:'100%', cursor:'grab'}}></div>
            {!isFlashing && !showCard && <div className="instruction-text">CLICK AND DRAG RIGHT TO TEAR</div>}
            {isFlashing && <div className="screen-flash"></div>}
            
            {/* The Reveal UI */}
            {showCard && (
                <div style={{position:'absolute', inset:0, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', zIndex:40, background:'rgba(0,0,0,0.8)'}}>
                    <h1 style={{fontFamily:'Orbitron', color: showCard.rarity === 'APEX' ? '#FFD700' : '#FFF', textShadow:'0 0 20px currentColor', letterSpacing:'5px'}}>{showCard.rarity} PULL!</h1>
                    <Card card={showCard} />
                    {showCard.isDust && <h3 style={{color:'#00F0FF', fontFamily:'Inter'}}>Duplicate Recycled! +{showCard.dustAmount} Astral Dust</h3>}
                    <button onClick={() => {setShowCard(null); setIsFlashing(false); onBack();}} style={{marginTop:'30px', padding:'15px 40px', background:'white', color:'black', border:'none', fontFamily:'Bebas Neue', fontSize:'1.5rem', cursor:'pointer'}}>CONTINUE</button>
                </div>
            )}
        </div>
    );
};

// --- APP ROOT (Systems Architecture) ---
const App = () => {
    const [screen, setScreen] = useState('menu');
    const [collection, setCollection] = useState([]);
    const [astralDust, setAstralDust] = useState(0);
    const [pityCounter, setPityCounter] = useState(0);
    const [isGuaranteed, setIsGuaranteed] = useState(false);

    // Advanced Gacha Logic: 50/50, Soft Pity, Duplicate Dust
    const executePull = () => {
        let currentPity = pityCounter + 1;
        let baseRateSSR = 0.05; // Base Apex Rate
        
        // Soft Pity Ramp
        if (currentPity >= 65) baseRateSSR += (currentPity - 64) * 0.025; 
        
        let isSSR = Math.random() < baseRateSSR;
        if (currentPity >= 80) isSSR = true; // Hard Pity

        let targetRarity = 'COMMON';
        if (isSSR) {
            setPityCounter(0);
            if (isGuaranteed || Math.random() > 0.5) {
                setIsGuaranteed(false);
                targetRarity = 'APEX'; // Won 50/50
            } else {
                setIsGuaranteed(true);
                targetRarity = 'APEX'; // Lost 50/50 (using APEX for both here for DB simplicity, but sets guarantee for next time)
            }
        } else {
            setPityCounter(currentPity);
            targetRarity = Math.random() < 0.2 ? 'RARE' : 'COMMON';
        }

        // Filter pool by rarity and pick random
        const pool = DB.filter(c => c.rarity === targetRarity) || DB;
        const pulledCard = pool[Math.floor(Math.random() * pool.length)] || DB[0];

        // Duplicate Check (Astral Dust Economy)
        const isDuplicate = collection.some(c => c.id === pulledCard.id);
        if (isDuplicate) {
            const dustValue = pulledCard.rarity === 'APEX' ? 100 : (pulledCard.rarity === 'RARE' ? 20 : 5);
            setAstralDust(prev => prev + dustValue);
            return { ...pulledCard, isDust: true, dustAmount: dustValue };
        } else {
            setCollection(prev => [...prev, pulledCard]);
            return { ...pulledCard, isDust: false };
        }
    };

    return (
        <>
            {screen === 'menu' && <MenuScreen onSummon={() => setScreen('pack')} onCollection={() => setScreen('collection')} dust={astralDust} />}
            {screen === 'pack' && <PackScreen onBack={() => setScreen('menu')} onPullComplete={executePull} />}
            {screen === 'collection' && <CollectionScreen collection={collection} onBack={() => setScreen('menu')} />}
        </>
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
