  LR:  { label:"LEGEND RARE",       color:"#ff006e", textColor:"#ff6eb3", rate:0.8,  stars:7 },
  UR:  { label:"ULTRA RARE",        color:"#ffd700", textColor:"#ffd700", rate:4,    stars:6 },
  SSR: { label:"SUPER SPECIAL RARE",color:"#a855f7", textColor:"#c084fc", rate:14,   stars:5 },
  SR:  { label:"SUPER RARE",        color:"#3b82f6", textColor:"#60a5fa", rate:31,   stars:4 },

};

const RARITY_ORDER = ["LR","UR","SSR","SR","R"];

// Weighted gacha draw
let _seed = Date.now();
const drawOne = () => {
  _seed++;
  const roll = Math.random()*100; let cum=0, rarity="R";
  for(const[k,v] of Object.entries(RC)){cum+=v.rate;if(roll<cum){rarity=k;break;}}
  const pool = VTUBERS.filter(v=>v.rarity===rarity);
  const src  = pool.length ? pool : VTUBERS.filter(v=>v.rarity==="R");
  const base = src[Math.floor(Math.random()*src.length)];
  // Apply small random variance to stats
  const rng=(s)=>{let x=Math.sin(s+1)*10000;return x-Math.floor(x);};
  const atk = Math.min(9999, Math.round(base.atk*(0.88+rng(_seed)*.24)));
  const def = Math.min(9999, Math.round(base.def*(0.88+rng(_seed+77)*.24)));
  return {...base, atk, def, uid:`${base.id}_${_seed}`};
};
const drawPack = (n=5) => Array.from({length:n},drawOne);

  return <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:0,overflow:"hidden"}}>
    {s.map(x=><div key={x.id} style={{position:"absolute",left:`${x.x}%`,top:`${x.y}%`,width:x.sz,height:x.sz,borderRadius:"50%",background:"#fff",animation:`pulse-glow ${2+x.d}s ease-in-out infinite`,animationDelay:`${x.d}s`}}/>)}
    <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse at 50% 0%,rgba(100,60,220,.13) 0%,transparent 60%)"}}/>
    <div style={{position:"absolute",top:"20%",left:"10%",width:400,height:400,borderRadius:"50%",background:"radial-gradient(circle,rgba(120,50,255,.07) 0%,transparent 70%)",filter:"blur(60px)"}}/>
    <div style={{position:"absolute",bottom:"10%",right:"5%",width:350,height:350,borderRadius:"50%",background:"radial-gradient(circle,rgba(0,180,255,.05) 0%,transparent 70%)",filter:"blur(60px)"}}/>

};

// ── CARD ──────────────────────────────────────────────────────────────────────
const Card = ({card, size="md", revealed=true, onClick, floating=false}) => {
  const r=RC[card.rarity]; const sm=size==="sm"; const W=sm?130:195; const H=sm?185:278;
  const isLR=card.rarity==="LR"; const isUR=card.rarity==="UR"; const isSSR=card.rarity==="SSR";

  if(!revealed) return (
    <div onClick={onClick} style={{width:W,height:H,borderRadius:14,cursor:"pointer",background:"linear-gradient(135deg,#0d0d2b,#1a0a2e,#0a0d1f)",border:"2px solid #2d1b69",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:8,boxShadow:"0 8px 32px rgba(0,0,0,.7)",flexShrink:0,userSelect:"none",transition:"transform .2s,box-shadow .2s"}}
    onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-4px) scale(1.03)";e.currentTarget.style.boxShadow="0 14px 40px rgba(100,80,255,.3)"}}
    onMouseLeave={e=>{e.currentTarget.style.transform="";e.currentTarget.style.boxShadow="0 8px 32px rgba(0,0,0,.7)"}}>
      <div style={{fontSize:sm?26:42,opacity:.3}}>🎴</div>
      <div style={{color:"#4c4c8a",fontFamily:"Orbitron",fontSize:sm?7:9,letterSpacing:2}}>CLICK TO REVEAL</div>
    </div>
  );

  return (
    <div className={`${isLR?"lr-border":""} ${isUR?"ur-glow":""} ${(isLR||isSSR)?"holo":""} ${floating?"float":""}`}
      onClick={onClick}
      style={{width:W,height:H,borderRadius:14,flexShrink:0,
        background:isLR?"linear-gradient(135deg,#1a0033,#0d001a,#001a33)":`linear-gradient(160deg,${card.color}22 0%,#060616 40%,${card.color}0e 100%)`,
        border:`2px solid ${r.color}`,display:"flex",flexDirection:"column",overflow:"hidden",
        position:"relative",cursor:onClick?"pointer":"default",userSelect:"none",
        boxShadow:`0 0 22px ${r.color}44,0 8px 32px rgba(0,0,0,.7)`,
        transition:"transform .2s,box-shadow .2s"}}
      onMouseEnter={e=>{if(onClick)e.currentTarget.style.transform="translateY(-6px) scale(1.04)"}}
      onMouseLeave={e=>{e.currentTarget.style.transform=""}}>

      {(isLR||isUR||isSSR)&&<div style={{position:"absolute",inset:0,borderRadius:12,pointerEvents:"none",zIndex:1,background:"linear-gradient(105deg,transparent 40%,rgba(255,255,255,.08) 50%,transparent 60%)",backgroundSize:"200% 100%",animation:"shimmer 3s infinite"}}/>}

      {/* rarity */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:sm?"5px 8px":"7px 10px",zIndex:2}}>
        <div style={{background:r.color,color:"#000",fontFamily:"Orbitron",fontSize:sm?7:9,fontWeight:900,padding:"2px 6px",borderRadius:4,letterSpacing:1}}>{card.rarity}</div>
        <div style={{display:"flex",gap:2}}>{Array.from({length:Math.min(r.stars,5)}).map((_,i)=><span key={i} style={{color:r.color,fontSize:sm?7:9}}>★</span>)}</div>
      </div>

      {/* portrait */}
      <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",zIndex:2,background:`radial-gradient(ellipse at center,${card.color}20 0%,transparent 70%)`,padding:"0 8px",overflow:"hidden"}}>
        <div style={{fontSize:sm?44:62,lineHeight:1,filter:`drop-shadow(0 0 14px ${card.color}) drop-shadow(0 0 28px ${card.color}88)`}}>
          {card.emoji}
        </div>
        <div style={{marginTop:7,color:"#fff",fontFamily:"Orbitron",fontWeight:700,fontSize:sm?8.5:11.5,textAlign:"center",lineHeight:1.3,textShadow:`0 0 12px ${card.color}`}}>
          {card.name.length>(sm?18:26)?card.name.substring(0,sm?16:24)+"…":card.name}
        </div>
        <div style={{color:card.color,fontFamily:"Rajdhani",fontSize:sm?8:10,fontWeight:700,letterSpacing:1,opacity:.9,marginTop:2}}>
          {card.agency}
        </div>
        {!sm&&<div style={{color:"#8899bb",fontSize:9.5,fontFamily:"Rajdhani",textAlign:"center",padding:"5px 2px 0",lineHeight:1.5,opacity:.78,overflow:"hidden",maxHeight:44}}>
          {card.desc.substring(0,90)}{card.desc.length>90?"…":""}
        </div>}
      </div>

      {/* stats */}
      <div style={{padding:sm?"4px 8px 6px":"6px 10px 8px",background:"rgba(0,0,0,.55)",zIndex:2,borderTop:`1px solid ${r.color}33`}}>
        <div style={{display:"flex",gap:4,alignItems:"center",marginBottom:sm?2:4}}>
          <div style={{color:"#ff6b6b",fontFamily:"Orbitron",fontSize:sm?7:9,fontWeight:700,width:sm?24:30}}>ATK</div>
          <Bar val={card.atk} color="#ff6b6b"/>
          <div style={{color:"#ff6b6b",fontFamily:"Rajdhani",fontSize:sm?9:11,fontWeight:700,width:sm?28:35,textAlign:"right"}}>{card.atk.toLocaleString()}</div>
        </div>
        <div style={{display:"flex",gap:4,alignItems:"center"}}>
          <div style={{color:"#6bcfff",fontFamily:"Orbitron",fontSize:sm?7:9,fontWeight:700,width:sm?24:30}}>DEF</div>
          <Bar val={card.def} color="#6bcfff"/>
          <div style={{color:"#6bcfff",fontFamily:"Rajdhani",fontSize:sm?9:11,fontWeight:700,width:sm?28:35,textAlign:"right"}}>{card.def.toLocaleString()}</div>
        </div>
      </div>
    </div>
  );
};

// ── SHARED UI ─────────────────────────────────────────────────────────────────
const BackBtn = ({onClick}) => <button onClick={onClick} style={{background:"rgba(255,255,255,.04)",border:"1px solid #222",borderRadius:8,padding:"7px 14px",cursor:"pointer",fontFamily:"Orbitron",fontSize:10,color:"#667",letterSpacing:1,transition:"all .2s"}} onMouseEnter={e=>{e.currentTarget.style.color="#fff";e.currentTarget.style.borderColor="#444"}} onMouseLeave={e=>{e.currentTarget.style.color="#667";e.currentTarget.style.borderColor="#222"}}>← BACK</button>;

const ActBtn = ({onClick,color,label,disabled}) => <button onClick={onClick} disabled={disabled} style={{background:`linear-gradient(135deg,${color}33,${color}11)`,border:`1px solid ${color}55`,borderRadius:10,padding:"11px 26px",cursor:disabled?"not-allowed":"pointer",fontFamily:"Orbitron",fontWeight:700,fontSize:11,color:"#fff",letterSpacing:1,transition:"all .2s",boxShadow:`0 4px 16px ${color}33`,opacity:disabled?.5:1}} onMouseEnter={e=>{if(!disabled){e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow=`0 8px 24px ${color}55`}}} onMouseLeave={e=>{e.currentTarget.style.transform="";e.currentTarget.style.boxShadow=`0 4px 16px ${color}33`}}>{label}</button>;

// ── MENU ──────────────────────────────────────────────────────────────────────
const MenuScreen = ({collection,totalPulls,onGacha,onCollection,onBattle}) => <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:22,padding:"36px 20px",minHeight:"100vh",justifyContent:"center",position:"relative",zIndex:2}}>
  <div className="float" style={{textAlign:"center"}}>
    <div style={{fontFamily:"Orbitron",fontWeight:900,fontSize:"clamp(26px,5vw,52px)",letterSpacing:4,lineHeight:1.05}}>
      <span className="shimmer-text">VTUBER</span><br/>
      <span style={{color:"#fff",textShadow:"0 0 30px #a855f7"}}>GACHA</span>
    </div>
    <div style={{color:"#443388",fontFamily:"Rajdhani",fontSize:11,letterSpacing:5,marginTop:7,fontWeight:600}}>バーチャルガチャ • {VTUBERS.length} VTUBERS IN POOL</div>
  </div>

  <div style={{display:"flex",gap:16,flexWrap:"wrap",justifyContent:"center"}}>
    {[{l:"CARDS",v:collection.length,c:"#a855f7"},{l:"PULLS",v:totalPulls,c:"#ffd700"},{l:"POOL",v:VTUBERS.length,c:"#22c55e"}].map(s=><div key={s.l} style={{textAlign:"center",background:"rgba(255,255,255,.03)",border:`1px solid ${s.c}33`,borderRadius:10,padding:"10px 18px"}}>
      <div style={{fontFamily:"Orbitron",fontWeight:900,fontSize:22,color:s.c}}>{s.v}</div>
      <div style={{fontFamily:"Rajdhani",fontSize:10,color:"#445",letterSpacing:2}}>{s.l}</div>
    </div>)}
  </div>

  <div style={{display:"flex",flexDirection:"column",gap:12,width:"100%",maxWidth:300}}>
    {[
      {fn:onGacha,     c:"#a855f7",icon:"🎴",l:"OPEN PACK",  sub:"5 cards per pull"},
      {fn:onCollection,c:"#ffd700",icon:"📚",l:"COLLECTION", sub:`${collection.length} cards owned`,dis:collection.length===0},
      {fn:onBattle,    c:"#ef4444",icon:"⚔️",l:"BATTLE",     sub:"Fight a random VTuber",dis:collection.length===0},
    ].map(b=><button key={b.l} onClick={!b.dis?b.fn:undefined} style={{background:b.dis?"rgba(255,255,255,.02)":`linear-gradient(135deg,${b.c}22,${b.c}11)`,border:`1px solid ${b.dis?"#1a1a3a":b.c+"66"}`,borderRadius:12,padding:"14px 22px",cursor:b.dis?"not-allowed":"pointer",display:"flex",alignItems:"center",gap:12,width:"100%",opacity:b.dis?.4:1,transition:"all .2s",boxShadow:b.dis?"none":`0 4px 20px ${b.c}22`}} onMouseEnter={e=>{if(!b.dis){e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow=`0 8px 30px ${b.c}44`}}} onMouseLeave={e=>{e.currentTarget.style.transform="";e.currentTarget.style.boxShadow=b.dis?"none":`0 4px 20px ${b.c}22`}}>
      <span style={{fontSize:24}}>{b.icon}</span>
      <div style={{textAlign:"left"}}>
        <div style={{fontFamily:"Orbitron",fontWeight:700,color:"#fff",fontSize:13,letterSpacing:1}}>{b.l}</div>
        <div style={{fontFamily:"Rajdhani",color:b.dis?"#334":b.c+"aa",fontSize:12,marginTop:2}}>{b.sub}</div>
      </div>
    </button>)}
  </div>

  {/* rarity legend */}
  <div style={{display:"flex",gap:8,flexWrap:"wrap",justifyContent:"center",maxWidth:350}}>
    {RARITY_ORDER.map(k=>{const v=RC[k];return <div key={k} style={{display:"flex",alignItems:"center",gap:5,background:"rgba(255,255,255,.02)",borderRadius:6,padding:"3px 9px",border:`1px solid ${v.color}33`}}>
      <div style={{width:7,height:7,borderRadius:"50%",background:v.color}}/><span style={{fontFamily:"Orbitron",fontSize:8,color:v.color}}>{k}</span><span style={{fontFamily:"Rajdhani",fontSize:9,color:"#445",marginLeft:2}}>{v.rate}%</span>
    </div>;})}
  </div>
  <div style={{color:"#223",fontFamily:"Rajdhani",fontSize:10,textAlign:"center",letterSpacing:1}}>
    Data sourced from Virtual YouTuber Wiki (CC BY-SA)
  </div>
</div>;

// ── PACK ──────────────────────────────────────────────────────────────────────
const PackScreen = ({onBack,onAdd}) => {
  const [phase,setPhase]=useState("ready");
  const [cards,setCards]=useState([]);
  const [revealed,setRevealed]=useState([]);
  const [animKey,setAnimKey]=useState(0);

  const open = () => {
    const c=drawPack(5); setCards(c); setRevealed([]); setPhase("opening"); setAnimKey(k=>k+1);
  };
  const revealOne = (i) => {
    const n=[...revealed,i]; setRevealed(n);
    if(n.length===cards.length) setTimeout(()=>setPhase("done"),400);
  };
  const revealAll = () => { setRevealed(cards.map((_,i)=>i)); setTimeout(()=>setPhase("done"),400); };
  const addAll = () => { onAdd(cards); onBack(); };

  return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",padding:"28px 16px",position:"relative",zIndex:2}}>
    <div style={{width:"100%",maxWidth:800,display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
      <BackBtn onClick={onBack}/>
      <div style={{fontFamily:"Orbitron",fontWeight:700,fontSize:14,color:"#fff",letterSpacing:3}}>PACK OPENING</div>
      <div style={{width:60}}/>
    </div>

    {phase==="ready"&&<div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:30}}>
      <div className="float" style={{fontSize:100,filter:"drop-shadow(0 0 32px #a855f7)"}}>🎴</div>
      <div style={{textAlign:"center"}}>
        <div style={{fontFamily:"Orbitron",fontSize:19,color:"#fff",fontWeight:700}}>MYSTERY PACK</div>
        <div style={{fontFamily:"Rajdhani",fontSize:13,color:"#556",marginTop:5}}>5 VTuber cards await inside</div>
      </div>
      <button onClick={open} style={{background:"linear-gradient(135deg,#7c3aed,#a855f7)",border:"none",borderRadius:14,padding:"16px 60px",cursor:"pointer",fontFamily:"Orbitron",fontWeight:700,fontSize:15,color:"#fff",letterSpacing:2,boxShadow:"0 8px 32px #a855f777",transition:"all .2s"}} onMouseEnter={e=>{e.currentTarget.style.transform="scale(1.06)";e.currentTarget.style.boxShadow="0 12px 44px #a855f799"}} onMouseLeave={e=>{e.currentTarget.style.transform="";e.currentTarget.style.boxShadow="0 8px 32px #a855f777"}}>
        OPEN PACK
      </button>
    </div>}

    {(phase==="opening"||phase==="done")&&<div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:18,width:"100%"}}>
      <div style={{display:"flex",gap:10,flexWrap:"wrap",justifyContent:"center",alignItems:"flex-end"}}>
        {cards.map((card,i)=>{
          const isRev=revealed.includes(i); const r=RC[card.rarity];
          return <div key={`${animKey}_${i}`} style={{position:"relative"}}>
            {isRev?<div className="card-reveal"><Card card={card}/></div>:<Card card={card} revealed={false} onClick={()=>revealOne(i)}/>}
            {isRev&&(card.rarity==="LR"||card.rarity==="UR")&&<div className="pop-in" style={{position:"absolute",top:-16,left:"50%",transform:"translateX(-50%)",background:r.color,color:"#000",fontFamily:"Orbitron",fontSize:9,fontWeight:900,padding:"3px 10px",borderRadius:20,whiteSpace:"nowrap",boxShadow:`0 0 14px ${r.color}`,zIndex:10}}>{r.label}!!</div>}
          </div>;
        })}
      </div>

      <div style={{display:"flex",gap:12,marginTop:10,flexWrap:"wrap",justifyContent:"center"}}>
        {phase==="opening"&&revealed.length<cards.length&&<ActBtn onClick={revealAll} color="#a855f7" label="Reveal All"/>}
        {phase==="done"&&<><ActBtn onClick={addAll} color="#22c55e" label="✓ Add to Collection"/><ActBtn onClick={open} color="#a855f7" label="Open Another Pack"/></>}
      </div>

      {phase==="done"&&<div className="slide-up" style={{display:"flex",gap:8,flexWrap:"wrap",justifyContent:"center"}}>
        {cards.map((c,i)=>{const r=RC[c.rarity];return <div key={i} style={{background:`${r.color}22`,border:`1px solid ${r.color}55`,borderRadius:8,padding:"4px 12px",fontFamily:"Rajdhani",fontSize:12,color:r.textColor,fontWeight:600}}>{c.rarity} · {c.name.split(" ")[0]}</div>;})}
      </div>}
    </div>}
  </div>;
};

// ── COLLECTION ────────────────────────────────────────────────────────────────
const CollectionScreen = ({collection,onBack}) => {
  const [filter,setFilter]=useState("ALL");
  const filtered=filter==="ALL"?collection:collection.filter(c=>c.rarity===filter);
  const sorted=[...filtered].sort((a,b)=>RARITY_ORDER.indexOf(a.rarity)-RARITY_ORDER.indexOf(b.rarity));
  const counts={}; RARITY_ORDER.forEach(r=>{counts[r]=collection.filter(c=>c.rarity===r).length;});
  return <div style={{minHeight:"100vh",padding:"24px 16px",position:"relative",zIndex:2}}>
    <div style={{maxWidth:940,margin:"0 auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <BackBtn onClick={onBack}/>
        <div style={{fontFamily:"Orbitron",fontWeight:700,fontSize:14,color:"#fff",letterSpacing:3}}>COLLECTION <span style={{color:"#a855f7"}}>({collection.length})</span></div>
        <div style={{width:60}}/>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap",justifyContent:"center"}}>
        {["ALL",...RARITY_ORDER].map(r=>{const rc=r==="ALL"?null:RC[r];const cnt=r==="ALL"?collection.length:(counts[r]||0);const on=filter===r;return <button key={r} onClick={()=>setFilter(r)} style={{background:on?(rc?rc.color:"#a855f7"):"rgba(255,255,255,.04)",border:`1px solid ${rc?rc.color+"66":"#333"}`,borderRadius:20,padding:"4px 12px",cursor:"pointer",fontFamily:"Orbitron",fontSize:9,fontWeight:700,color:on?"#000":(rc?rc.color:"#667"),transition:"all .2s"}}>{r} {cnt>0&&<span style={{opacity:.7}}>({cnt})</span>}</button>;})}
      </div>
      {sorted.length===0
        ?<div style={{textAlign:"center",color:"#334",fontFamily:"Rajdhani",fontSize:16,marginTop:50}}>No cards yet — open some packs!</div>
        :<div style={{display:"flex",flexWrap:"wrap",gap:10,justifyContent:"center"}}>{sorted.map(c=><Card key={c.uid} card={c} size="sm"/>)}</div>
      }
    </div>
  </div>;
};

// ── BATTLE ────────────────────────────────────────────────────────────────────
const BattleScreen = ({collection,onBack}) => {
  const [phase,setPhase]=useState("select");
  const [myCard,setMyCard]=useState(null); const [oppCard,setOppCard]=useState(null);
  const [result,setResult]=useState(null); const [log,setLog]=useState([]); const [hitAnim,setHitAnim]=useState("");
  const RR={win:{label:"VICTORY!",color:"#22c55e",emoji:"🏆"},lose:{label:"DEFEATED",color:"#ef4444",emoji:"💀"},draw:{label:"DRAW",color:"#f59e0b",emoji:"🤝"}};

  const fight = (card) => {
    const opp=drawOne(); setMyCard(card); setOppCard(opp); setPhase("fighting");
    setTimeout(()=>{
      const rng=()=>.75+Math.random()*.5;
      const mA=card.atk*rng(),mD=card.def*rng(),oA=opp.atk*rng(),oD=opp.def*rng();
      const mT=mA+mD,oT=oA+oD;
      const outcome=mT>oT*1.05?"win":mT<oT*.95?"lose":"draw";
      setHitAnim(outcome==="win"?"opp":outcome==="lose"?"mine":""); setResult(outcome);
      setLog([`⚔️  ${card.name} ATK: ${Math.round(mA).toLocaleString()}`,`🛡️  ${card.name} DEF: ${Math.round(mD).toLocaleString()}`,`⚔️  ${opp.name} ATK: ${Math.round(oA).toLocaleString()}`,`🛡️  ${opp.name} DEF: ${Math.round(oD).toLocaleString()}`,`📊  Your score: ${Math.round(mT).toLocaleString()} vs Opp: ${Math.round(oT).toLocaleString()}`]);
      setPhase("result");
    },1800);
  };
  const reset=()=>{setPhase("select");setMyCard(null);setOppCard(null);setResult(null);setLog([]);setHitAnim("");};

  return <div style={{minHeight:"100vh",padding:"24px 16px",position:"relative",zIndex:2}}>
    <div style={{maxWidth:820,margin:"0 auto",display:"flex",flexDirection:"column",alignItems:"center",gap:20}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%"}}>
        <BackBtn onClick={onBack}/>
        <div style={{fontFamily:"Orbitron",fontWeight:700,fontSize:14,color:"#fff",letterSpacing:3}}>BATTLE</div>
        <div style={{width:60}}/>
      </div>

      {phase==="select"&&<>
        <div style={{fontFamily:"Rajdhani",color:"#667",fontSize:14,textAlign:"center"}}>Pick your fighter — highest combined ATK + DEF wins!</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:10,justifyContent:"center"}}>
          {[...collection].sort((a,b)=>(b.atk+b.def)-(a.atk+a.def)).map(c=><div key={c.uid} style={{position:"relative",cursor:"pointer"}} onClick={()=>fight(c)}>
            <Card card={c} size="sm"/>
            <div style={{position:"absolute",bottom:36,left:"50%",transform:"translateX(-50%)",background:"rgba(0,0,0,.85)",borderRadius:6,padding:"2px 7px",fontFamily:"Rajdhani",fontSize:10,color:"#fff",whiteSpace:"nowrap",fontWeight:700}}>PWR {(c.atk+c.def).toLocaleString()}</div>
          </div>)}
        </div>
      </>}

      {(phase==="fighting"||phase==="result")&&myCard&&oppCard&&<>
        <div style={{display:"flex",alignItems:"center",gap:20,flexWrap:"wrap",justifyContent:"center",width:"100%"}}>
          <div className={phase==="result"&&hitAnim==="mine"?"battle-shake":""} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
            <div style={{fontFamily:"Orbitron",fontSize:10,color:"#22c55e",letterSpacing:2}}>YOU</div>
            <Card card={myCard} floating={phase==="fighting"}/>
          </div>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8,minWidth:90}}>
            {phase==="fighting"&&<div style={{fontFamily:"Orbitron",fontSize:34,fontWeight:900,color:"#ef4444",textShadow:"0 0 22px #ef4444"}}>VS</div>}
            {phase==="result"&&result&&<div className="pop-in" style={{textAlign:"center"}}><div style={{fontSize:46}}>{RR[result].emoji}</div><div style={{fontFamily:"Orbitron",fontWeight:900,fontSize:21,color:RR[result].color,textShadow:`0 0 20px ${RR[result].color}`}}>{RR[result].label}</div></div>}
          </div>
          <div className={phase==="result"&&hitAnim==="opp"?"battle-shake":""} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
            <div style={{fontFamily:"Orbitron",fontSize:10,color:"#ef4444",letterSpacing:2}}>OPP</div>
            <Card card={oppCard} revealed={phase==="result"} floating={phase==="fighting"}/>
          </div>
        </div>
        {phase==="result"&&<div className="slide-up" style={{background:"rgba(255,255,255,.02)",border:"1px solid #1e1e3f",borderRadius:12,padding:"14px 18px",width:"100%",maxWidth:500}}>
          {log.map((l,i)=><div key={i} style={{fontFamily:"Rajdhani",fontSize:12,color:"#556",lineHeight:2}}>{l}</div>)}
        </div>}
        {phase==="result"&&<div style={{display:"flex",gap:12,flexWrap:"wrap",justifyContent:"center"}}><ActBtn onClick={reset} color="#a855f7" label="Battle Again"/><ActBtn onClick={onBack} color="#334" label="Back to Menu"/></div>}
        {phase==="fighting"&&<div style={{fontFamily:"Orbitron",fontSize:11,color:"#445",letterSpacing:4,animation:"pulse-glow 1s ease-in-out infinite"}}>CALCULATING...</div>}
      </>}
    </div>
  </div>;
};

// ── ROOT ──────────────────────────────────────────────────────────────────────
const App = function VTuberGacha() {
  const [screen,setScreen]=useState("menu");
  const [collection,setCollection]=useState([]);
  const [totalPulls,setTotalPulls]=useState(0);

  useEffect(()=>{const el=document.createElement("style");el.textContent=STYLE;document.head.appendChild(el);return()=>el.remove();},[]);

  const addCards=(cards)=>{setCollection(p=>[...p,...cards]);setTotalPulls(p=>p+cards.length);};

  return <div style={{minHeight:"100vh",background:"#04040f",position:"relative",fontFamily:"Rajdhani,sans-serif"}}>
    <Stars/>
    {screen==="menu"       &&<MenuScreen       collection={collection} totalPulls={totalPulls} onGacha={()=>setScreen("pack")} onCollection={()=>setScreen("collection")} onBattle={()=>setScreen("battle")}/>}
    {screen==="pack"       &&<PackScreen        onBack={()=>setScreen("menu")} onAdd={addCards}/>}
    {screen==="collection" &&<CollectionScreen  collection={collection} onBack={()=>setScreen("menu")}/>}
    {screen==="battle"     &&<BattleScreen      collection={collection} onBack={()=>setScreen("menu")}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
